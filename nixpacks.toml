[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "gcc",
  "pkg-config",
  "expat",
  "zlib",
  "libjpeg",
  "libpng",
  "geos",
  "proj",
  "gdal",
  "sqlite",
  "postgresql"
]

[phases.install]
cmds = [
  "cd backend && python3 -m pip install --upgrade pip setuptools wheel",
  "cd backend && python3 -m pip install -r requirements.txt"
]

[start]
cmd = "cd backend && python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"