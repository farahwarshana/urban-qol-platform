<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Malaz</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #02070a;
      font-family: Arial, sans-serif;
    }

    .splash {
      min-height: 100vh;

      background:
        linear-gradient(rgba(0, 5, 8, 0.08),
          rgba(0, 5, 8, 0.22)),
        url("images/opening-bg.png");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      align-items: center;
      justify-content: center;

      position: relative;
    }

    .splash::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        radial-gradient(circle,
          rgba(0, 255, 230, 0.08),
          transparent 45%);

      animation: pulseGlow 3s ease-in-out infinite alternate;
    }

    /* Loading percentage */
    .loading-text {
      position: absolute;

      left: 50%;
      top: 69%;

      transform: translateX(-50%);

      color: #dff;

      font-size: 16px;
      letter-spacing: 0.18em;
      text-transform: uppercase;

      text-shadow:
        0 0 12px rgba(0, 255, 230, 0.55);

      z-index: 5;
    }

    /* Loader */
    .real-loader {
      position: absolute;

      left: 50%;
      top: 73%;

      transform: translateX(-50%);

      width: 420px;
      height: 7px;

      background:
        rgba(255, 255, 255, 0.12);

      border-radius: 30px;

      overflow: hidden;

      z-index: 5;

      box-shadow:
        0 0 16px rgba(0, 255, 230, 0.20);
    }

    .real-loader-fill {
      width: 0;
      height: 100%;

      border-radius: inherit;

      background:
        linear-gradient(90deg,
          #00ffe5,
          #4cc2ff);

      box-shadow:
        0 0 18px #00ffe5;

      animation: loadingBar 2.2s ease forwards;
    }

    /* ENTER BUTTON */
    .enter-btn {
      position: absolute;

      left: 50%;
      top: 82%;

      transform: translateX(-50%);

      width: 330px;
      height: 68px;

      border-radius: 18px;

      border:
        1px solid rgba(0, 255, 230, 0.55);

      background:
        rgba(0, 255, 230, 0.07);

      color: #dff;

      font-size: 17px;
      letter-spacing: 0.22em;
      text-transform: uppercase;

      cursor: pointer;

      backdrop-filter: blur(10px);

      box-shadow:
        0 0 22px rgba(0, 255, 230, 0.18);

      transition:
        transform .25s ease,
        box-shadow .25s ease,
        background .25s ease;

      z-index: 10;
    }

    .enter-btn:hover {
      transform:
        translateX(-50%)
        scale(1.04);

      background:
        rgba(0, 255, 230, 0.14);

      box-shadow:
        0 0 32px rgba(0, 255, 230, 0.42);
    }

    @keyframes loadingBar {
      from {
        width: 0;
      }

      to {
        width: 100%;
      }
    }

    @keyframes pulseGlow {
      from {
        opacity: .35;
      }

      to {
        opacity: .95;
      }
    }
  </style>
</head>

<body>

  <div class="splash">

    <!-- Percentage -->
    <div class="loading-text" id="loadingPercent">
      0%
    </div>

    <!-- Loader -->
    <div class="real-loader">
      <div class="real-loader-fill"></div>
    </div>

    <!-- Button -->
    <button class="enter-btn"
      onclick="window.location.href='login.html'">

      ENTER PLATFORM

    </button>

  </div>

  <script>

    let percent = 0;

    const counter =
      document.getElementById("loadingPercent");

    const interval = setInterval(() => {

      percent++;

      counter.innerText =
        percent + "%";

      if (percent >= 100) {
        clearInterval(interval);
      }

    }, 22);

  </script>

</body>

</html>
