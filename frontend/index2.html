<!DOCTYPE html>
<!--
  index.html — Urban Quality of Life Analysis Platform
  Entry point — redirects to login or dashboard based on session.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malaz</title>
  <link type="image/png" sizes="16x16" rel="icon" href="https://img.icons8.com/isometric-line/50/ffffff/building.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Style -->
  <link rel="stylesheet" href="index_only.css">
  <style>
    /* Simple splash screen while redirect happens */
    .splash {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--bg-deepest);
    }

    .splash-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .splash-icon {
      font-size: 40px;
      animation: rotateSlow 8s linear infinite;
    }

    .splash-name {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .splash-sub {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .splash-loader {
      width: 200px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .splash-loader-fill {
      height: 100%;
      background: var(--accent);
      animation: loadingBar 1.2s ease forwards;
    }

    @keyframes loadingBar {
      from { width: 0; }
      to   { width: 100%; }
    }

    .splash-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="splash page-fade">
    <div class="splash-brand">
      <div class="splash-icon">🗺️</div>
      <div>
        <div class="splash-name">Malaz</div>
        <div class="splash-sub">Urban Quality of Life Analysis</div>
      </div>
    </div>
    <div class="splash-loader">
      <div class="splash-loader-fill"></div>
    </div>
    <div class="splash-label">Initializing workspace...</div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Check for existing session and redirect accordingly
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        if (loadUserFromSession()) {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'login.html';
        }
      }, 1400); // Brief splash screen delay
    });
  </script>
</body>

</html>
