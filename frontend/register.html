<!DOCTYPE html>
<!--
  register.html
  ----------------------------------------------------------
  Registration page (UI only). All "submit" does for now is
  show a friendly message + redirect. Wire it to your backend
  inside /js/app.js where indicated.
  ----------------------------------------------------------
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Malaz · Sign Up</title>
  <link type="image/png" sizes="16x16" rel="icon" href="https://img.icons8.com/isometric-line/50/ffffff/building.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <button class="theme-toggle-float" onclick="toggleTheme()" title="Switch to light mode">☀️</button>
  <div class="auth-wrapper">
    <div class="auth-card fade-in">

      <div class="brand">
        <span>
          <img width="45" height="45" src="https://img.icons8.com/isometric-line/50/4cc2ff/building.png" alt="building"/>
        </span>
        <span>Malaz · Urban Quality of Life Analysis</span>
      </div>

      <h1>Create an account</h1>
      <p class="subtitle">and get full access to analyze urban quality of life.</p>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Jane Doe" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">
          Create account
        </button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
