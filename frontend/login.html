<!DOCTYPE html>
<!--
  login.html
  ----------------------------------------------------------
  Login page (UI only).
  No real auth logic is wired up. See // TODO comments in
  /js/app.js for where to plug your Python backend.
  ----------------------------------------------------------
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Malaz · Login</title>
  <link type="image/png" sizes="16x16" rel="icon" href="https://img.icons8.com/isometric-line/50/ffffff/building.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap 5 (CDN) — used for grid/utilities only -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Our app stylesheet -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <button class="theme-toggle-float" onclick="toggleTheme()" title="Switch to light mode">☀️</button>
  <div class="auth-wrapper">
    <div class="auth-card fade-in">

      <!-- Brand / logo -->
      <div class="brand">
        <span>
          <img width="45" height="45" src="https://img.icons8.com/isometric-line/50/4cc2ff/building.png" alt="building"/>
        </span>
        <span>Malaz · Urban Quality of Life Analysis</span>
      </div>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to get full access to Malaz.</p>

      <!-- Login form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">
          Login
        </button>

        <button type="button" id="guestBtn" class="btn btn-ghost btn-block mt-2">
          Continue as guest
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="register.html">Register</a>
      </p>
    </div>
  </div>

  <!-- Shared app JS (handles login form submission for now) -->
  <script src="js/app.js"></script>
</body>
</html>
