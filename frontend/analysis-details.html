// Download the result file from backend — fetch as blob so the browser always
// saves it (avoids the anchor-href navigation issue in some browsers)
async function downloadResultFile() {
  if (!_analysis?.result_file) { alert("No result file available."); return; }
  try {
    const res = await fetch(`${API_BASE_URL}/${_analysis.result_file}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const buf  = await res.arrayBuffer();
    const type = _isRaster ? "application/octet-stream" : "application/geo+json";
    const blob = new Blob([buf], { type });
    const fname = _analysis.result_file.split("/").pop();

    if (!_isRaster && _resultBlob) {
      // Inject simplestyle colour properties so GIS tools render it correctly
      downloadStyledGeoJSON(_resultBlob, `${_analysis.type}_result.geojson`);
      return;
    }

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  } catch(e) {
    alert("Download failed: " + e.message);
  }
}

// Mirror dashboard's downloadGeoJSON — deep-copy + inject simplestyle fill props
function downloadStyledGeoJSON(geojson, filename) {
  const copy = JSON.parse(JSON.stringify(geojson));
  const type = _analysis.type;

  // Sort features for GIS rendering (same order as dashboard)
  if (type === "public-transport") {
    copy.features.sort((a, b) => {
      const rank = p => (p.layer === "boundary" || p.layer === "station") ? 0
        : p.type === "uncovered" ? 1 : 2;
      return rank(a.properties||{}) - rank(b.properties||{});
    });
  } else if (type === "facility-accessibility") {
    const allTimes = [...new Set(copy.features.map(f => f.properties.time_min).filter(x => x != null))].sort((a,b) => b-a);
    copy.features.sort((a, b) => {
      const rk = p => p.layer === "boundary" ? 0
        : (p.type === "uncovered" || p.category === "uncovered") ? 1
        : p.time_min != null ? 2 + allTimes.indexOf(p.time_min) : 99;
      return rk(a.properties||{}) - rk(b.properties||{});
    });
  }

  // Inject simplestyle fill colours matching each type's legend
  copy.features.forEach(f => {
    const p = f.properties || {};
    let fill = "#888888", fillOpacity = 0.6;

    switch(type) {
      case "crime": {
        const d = p.crime_density || 0;
        fill = d > 20 ? "#891508" : d > 15 ? "#e74c3c" : d > 10 ? "#e67e22" : d > 5 ? "#f1c40f" : "#2ecc71";
        break;
      }
      case "urban-density": {
        const d = p.density || p.pop_density || 0;
        fill = d > 30000 ? "#253494" : d > 15000 ? "#2c7fb8" : d > 5000 ? "#41b6c4" : d > 1000 ? "#a1dab4" : "#ffffcc";
        break;
      }
      case "public-transport": {
        if (p.layer === "boundary" || p.layer === "station") { fill = "#f0a500"; fillOpacity = 0; }
        else { const cov = p.coverage_pct || 0; fill = cov > 80 ? "#198754" : cov > 60 ? "#52b788" : cov > 40 ? "#ffc107" : cov > 20 ? "#fd7e14" : "#e74c3c"; fillOpacity = 0.55; }
        break;
      }
      case "traffic": {
        const h = p.hierarchy || p.road_type || "";
        fill = h === "primary" ? "#e74c3c" : h === "secondary" ? "#f39c12" : h === "local" ? "#3498db" : "#95a5a6";
        fillOpacity = 0;
        break;
      }
      case "vegetation": {
        const v = p.vegetation_pct || 0;
        fill = v >= 60 ? "#27ae60" : v >= 30 ? "#f39c12" : "#e74c3c";
        break;
      }
      case "informal-settlement": {
        const t = p.settlement_type || p.type || "";
        fill = t.includes("informal") || t.includes("slum") ? "#e74c3c" : t.includes("formal") ? "#27ae60" : "#f39c12";
        break;
      }
      case "facility-accessibility": {
        if (p.type === "facility") { fill = "#4cc2ff"; fillOpacity = 0.9; }
        else { const cov = p.coverage_pct || p.accessibility_score || 0; fill = cov > 70 ? "#27ae60" : cov > 40 ? "#f39c12" : "#e74c3c"; fillOpacity = 0.55; }
        break;
      }
    }

    f.properties["fill"]           = fill;
    f.properties["fill-opacity"]   = fillOpacity;
    f.properties["stroke"]         = fill;
    f.properties["stroke-width"]   = 1;
    f.properties["stroke-opacity"] = fillOpacity > 0 ? 0.6 : 0;
  });

  const blob = new Blob([JSON.stringify(copy, null, 2)], { type:"application/geo+json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

function downloadCSV() {
  if (!_resultBlob?.features?.length) { alert("Result not loaded."); return; }
  const features = _resultBlob.features;
  const cols = Object.keys(features[0].properties || {});
  const rows = [cols.join(",")];
  features.forEach(f => {
    rows.push(cols.map(c => {
      const v = f.properties[c];
      if (v == null) return "";
      const s = String(v);
      return s.includes(",") || s.includes('"') ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(","));
  });
  const blob = new Blob([rows.join("\n")], { type:"text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${_analysis.type}_result_${_analysis.id}.csv`;
  a.click();
}

// ── Shared PDF engine (mirrors dashboard's downloadAnalysisPDF exactly) ───────
function _buildPdfEngine(jsPDF) {
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const PW = 210, PH = 297, ML = 14, MR = 14, CW = PW - ML - MR;
  let y = 0;

  const C = {
    bg:[15,17,26], panel:[22,26,40], card:[28,33,50],
    accent:[76,194,255], accentDim:[40,100,140],
    textMain:[220,225,240], textMuted:[130,140,165],
    border:[45,52,75], white:[255,255,255],
  };

  const sf  = rgb => doc.setFillColor(rgb[0],rgb[1],rgb[2]);
  const sd  = rgb => doc.setDrawColor(rgb[0],rgb[1],rgb[2]);
  const stc = rgb => doc.setTextColor(rgb[0],rgb[1],rgb[2]);
  const rct = (x,yw,w,h,s="F") => doc.rect(x,yw,w,h,s);

  function hexToRgb(hex) {
    if (!hex || hex.length < 7) return C.accent;
    return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
  }
  function safe(str) {
    if (!str) return "";
    return String(str).replace(/💡/g,"[i]").replace(/⚠️?/g,"[!]").replace(/✅/g,"[ok]")
      .replace(/📊/g,"[chart]").replace(/✦/g,"*").replace(/·/g,"-").replace(/•/g,"-")
      .replace(/[^\x00-\xFF]/g,"?");
  }
  function ensurePage(needed) {
    if (y + needed > PH - 12) { doc.addPage(); sf(C.bg); rct(0,0,PW,PH); y = 14; }
  }
  function sectionHeader(text) {
    ensurePage(12);
    sf(C.panel); rct(ML,y,CW,9);
    sf(C.accent); rct(ML,y,3,9);
    stc(C.white); doc.setFontSize(9); doc.setFont("helvetica","bold");
    doc.text(safe(text), ML+5, y+6); y += 12;
  }
  function cardGrid(cards) {
    if (!cards.length) return;
    const colW=(CW-2)/2, cardH=10, gap=1.5;
    let rowY=y;
    cards.forEach((card,i) => {
      if (i%2===0) { ensurePage(cardH+gap); rowY=y; }
      const col=i%2, cx=ML+col*(colW+2);
      sf(C.card); rct(cx,rowY,colW,cardH);
      sd(C.border); doc.setLineWidth(0.15); rct(cx,rowY,colW,cardH,"S");
      doc.setFont("helvetica","normal"); doc.setFontSize(7); stc(C.textMuted);
      doc.text(safe(card.label), cx+3, rowY+3.5);
      doc.setFont("helvetica","bold"); doc.setFontSize(8); stc(C.textMain);
      const vl = doc.splitTextToSize(safe(card.value), colW-6);
      doc.text(vl[0]||safe(card.value), cx+3, rowY+7.5);
      if (col===1||i===cards.length-1) y=rowY+cardH+gap;
    });
  }
  function scoreGauge(score) {
    if (score==null) return;
    ensurePage(22);
    const bx=ML, bw=CW, bh=12, by=y+4;
    sf(C.panel); rct(ML,y,CW,20);
    stc(C.textMuted); doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.text("Overall QoL Score", ML+2, y+3.5);
    sf(C.card); rct(bx,by,bw,bh);
    sd(C.border); doc.setLineWidth(0.2); rct(bx,by,bw,bh,"S");
    const fillW=Math.max(2,(score/100)*bw);
    const fillColor=score>=75?[46,204,113]:score>=50?[139,195,74]:score>=25?[243,156,18]:[231,76,60];
    sf(fillColor); rct(bx,by,fillW,bh);
    sd(C.border); doc.setLineWidth(0.3);
    [25,50,75].forEach(v=>{const tx=bx+(v/100)*bw; doc.line(tx,by,tx,by+bh);});
    stc(C.white); doc.setFont("helvetica","bold"); doc.setFontSize(8);
    doc.text(`${Math.round(score)} / 100`, bx+fillW/2, by+bh/2+2.5, {align:"center"});
    stc(C.textMuted); doc.setFont("helvetica","normal"); doc.setFontSize(6.5);
    ["Poor","Fair","Good","Excellent"].forEach((lbl,i)=>
      doc.text(lbl, bx+(i*25+12.5)/100*bw, by+bh+3.5, {align:"center"}));
    y += 24;
  }
  function barChart(data) {
    if (!data) return;
    const {title:ct, labels, values, colors, unit} = data;
    const n=labels.length, maxVal=Math.max(...values,1);
    const chartH=38, totalH=chartH+22;
    ensurePage(totalH+4);
    sf(C.panel); rct(ML,y,CW,totalH+2);
    stc(C.textMuted); doc.setFont("helvetica","bold"); doc.setFontSize(7.5);
    doc.text(safe(ct), ML+CW/2, y+5, {align:"center"});
    const chartTop=y+8, barAreaW=CW-16, barAreaX=ML+8;
    sd(C.border); doc.setLineWidth(0.15);
    [0,0.5,1].forEach(frac=>{
      const lineY=chartTop+chartH*(1-frac);
      doc.line(barAreaX,lineY,barAreaX+barAreaW,lineY);
      if(frac>0){stc(C.textMuted);doc.setFont("helvetica","normal");doc.setFontSize(6);
        doc.text(`${Math.round(maxVal*frac)}`,barAreaX-1,lineY+1,{align:"right"});}
    });
    const slotW=barAreaW/n, barW=Math.min(slotW*0.62,18);
    values.forEach((val,i)=>{
      const barH=Math.max(1,(val/maxVal)*chartH);
      const bx=barAreaX+i*slotW+(slotW-barW)/2, by=chartTop+chartH-barH;
      const rgb=typeof colors[i]==="string"?hexToRgb(colors[i]):colors[i];
      sf([rgb[0]*0.4,rgb[1]*0.4,rgb[2]*0.4]); rct(bx+0.5,by+0.5,barW,barH);
      sf(rgb); rct(bx,by,barW,barH);
      stc(C.textMain); doc.setFont("helvetica","bold"); doc.setFontSize(6.5);
      doc.text(`${val}`,bx+barW/2,by-1.2,{align:"center"});
      stc(C.textMuted); doc.setFont("helvetica","normal"); doc.setFontSize(6);
      doc.splitTextToSize(safe(labels[i]),slotW-1)
        .forEach((ln,li)=>doc.text(safe(ln),bx+barW/2,chartTop+chartH+4+li*3.5,{align:"center"}));
    });
    stc(C.textMuted); doc.setFont("helvetica","italic"); doc.setFontSize(6);
    doc.text(`(${unit})`,barAreaX+barAreaW,chartTop+chartH+4,{align:"right"});
    y += totalH+5;
  }
  function insightBox(text) {
    if (!text) return;
    const lines = doc.splitTextToSize(safe(text), CW-10);
    const bh = lines.length*4.5+5;
    ensurePage(bh+3);
    sf(C.panel); rct(ML,y,CW,bh);
    sf(C.accentDim); rct(ML,y,2.5,bh);
    stc(C.textMain); doc.setFont("helvetica","italic"); doc.setFontSize(8);
    lines.forEach((line,i)=>doc.text(line,ML+5,y+4.5+i*4.5));
    y += bh+3;
  }
  function scoreHeatmapStrip(gridFeatures) {
    if (!gridFeatures?.length) return;
    const scores = gridFeatures.map(f=>f.properties?.qol_score).filter(s=>s!=null).sort((a,b)=>a-b);
    if (!scores.length) return;
    ensurePage(28);
    sf(C.panel); rct(ML,y,CW,26);
    stc(C.textMuted); doc.setFont("helvetica","bold"); doc.setFontSize(7.5);
    doc.text("Grid Cell Score Distribution (sorted low to high)", ML+CW/2, y+5, {align:"center"});
    const stripY=y+8, stripH=10, n=scores.length, cellW=Math.max(0.3,CW/n);
    scores.forEach((s,i)=>{
      const r=s>=75?46:s>=50?139:s>=25?243:231;
      const g=s>=75?204:s>=50?195:s>=25?156:76;
      const b=s>=75?113:s>=50?74:s>=25?18:60;
      doc.setFillColor(r,g,b); doc.rect(ML+i*cellW,stripY,cellW+0.1,stripH,"F");
    });
    const legItems=[{label:"Excellent (75–100)",r:46,g:204,b:113},{label:"Good (50–74)",r:139,g:195,b:74},
      {label:"Fair (25–49)",r:243,g:156,b:18},{label:"Poor (0–24)",r:231,g:76,b:60}];
    const legW=CW/4;
    legItems.forEach((item,i)=>{const lx=ML+i*legW;
      doc.setFillColor(item.r,item.g,item.b); doc.rect(lx,stripY+stripH+2,4,3,"F");
      stc(C.textMuted); doc.setFont("helvetica","normal"); doc.setFontSize(6);
      doc.text(item.label,lx+5.5,stripY+stripH+4.5);});
    y += 30;
  }
  function footer(service) {
    const pageCount = doc.getNumberOfPages();
    for (let p=1; p<=pageCount; p++) {
      doc.setPage(p);
      sf(C.panel); rct(0,PH-10,PW,10);
      sf(C.accentDim); rct(0,PH-10,PW,0.5);
      stc(C.textMuted); doc.setFont("helvetica","normal"); doc.setFontSize(7);
      doc.text("Malaz - Urban Quality of Life Platform", ML, PH-4);
      doc.text(`Page ${p} of ${pageCount}`, PW-MR, PH-4, {align:"right"});
    }
  }
  function coverPage(title, service) {
    sf(C.bg); rct(0,0,PW,PH);
    sf(C.panel); rct(0,0,PW,38);
    sf(C.accent); rct(0,35.5,PW,2.5);
    stc(C.accent); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text("MALAZ", ML, 12);
    stc(C.textMuted); doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.text("Urban Quality of Life Platform", ML, 17);
    stc(C.white); doc.setFont("helvetica","bold"); doc.setFontSize(16);
    doc.splitTextToSize(safe(title), CW-20).forEach((line,i)=>doc.text(line,ML,27+i*7));
    stc(C.textMuted); doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
    const dateStr = new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
    doc.text(`Generated: ${dateStr}`, PW-MR, 12, {align:"right"});
    doc.text(`Service: ${service}`,   PW-MR, 17, {align:"right"});
    y = 44;
  }

  // Capture map canvas snapshot
  function captureMap() {
    try {
      const canvas = document.querySelector("#analysisMap canvas");
      if (!canvas) return null;
      return { url: canvas.toDataURL("image/jpeg",0.85), w: canvas.width||1, h: canvas.height||1 };
    } catch(e) { return null; }
  }
  function addMapImage(map) {
    if (!map) return;
    const imgW=CW-2, imgH=Math.min(90, imgW*(map.h/map.w));
    ensurePage(imgH+12);
    sf(C.panel); rct(ML,y,CW,imgH+4);
    try { doc.addImage(map.url,"JPEG",ML+1,y+1,imgW,imgH); } catch(e){}
    stc(C.textMuted); doc.setFont("helvetica","italic"); doc.setFontSize(7);
    doc.text("Map — Full Area view at time of export", ML+2, y+imgH+5);
    y += imgH+9;
  }

  return { doc, PW, PH, ML, MR, CW,
    get y() { return y; }, set y(v) { y=v; },
    C, safe, ensurePage, sectionHeader, cardGrid, scoreGauge,
    barChart, insightBox, scoreHeatmapStrip, footer, coverPage,
    captureMap, addMapImage, hexToRgb, sf, stc };
}

// Extract stat cards from a pane
function _extractCards(paneId) {
  return Array.from(document.querySelectorAll(`#${paneId} .stat-box`)).map(el => ({
    label: el.querySelector(".stat-label")?.textContent?.trim() || "",
    value: el.querySelector(".stat-value")?.textContent?.trim().replace(/\s+/g," ") || "",
  })).filter(c => c.label);
}

// Compute bar chart data from loaded GeoJSON (same logic as dashboard's computeFullVisuals)
function _computeVisuals(type, features) {
  if (!features?.length) return null;
  switch(type) {
    case "crime": {
      const b=[0,0,0,0,0];
      features.forEach(f=>{const d=f.properties.crime_density||0;
        if(d<=5)b[0]++;else if(d<=10)b[1]++;else if(d<=15)b[2]++;else if(d<=20)b[3]++;else b[4]++;});
      return {title:"Crime Density Distribution",labels:["0–5","5–10","10–15","15–20",">20"],
        values:b,colors:["#2ecc71","#f1c40f","#e67e22","#e74c3c","#891508"],unit:"/km²"};
    }
    case "urban-density": {
      const b=[0,0,0,0,0];
      features.forEach(f=>{const d=f.properties.density||f.properties.pop_density||0;
        if(d<500)b[0]++;else if(d<2000)b[1]++;else if(d<5000)b[2]++;else if(d<10000)b[3]++;else b[4]++;});
      return {title:"Population Density Distribution",labels:["<500","500–2k","2k–5k","5k–10k",">10k"],
        values:b,colors:["#add8e6","#87ceeb","#4682b4","#4169e1","#000080"],unit:"pop/km²"};
    }
    case "public-transport": {
      const cov=features.filter(f=>f.properties.type==="covered").length;
      const unc=features.filter(f=>f.properties.type==="uncovered").length;
      if(!cov&&!unc) return null;
      return {title:"Coverage Breakdown",labels:["Covered","Uncovered"],
        values:[cov,unc],colors:["#4cc2ff","#e74c3c"],unit:"zones"};
    }
    case "facility-accessibility": {
      const t5=features.filter(f=>f.properties.time_min===5).length;
      const t10=features.filter(f=>f.properties.time_min===10).length;
      const t15=features.filter(f=>f.properties.time_min===15).length;
      if(!t5&&!t10&&!t15) return null;
      return {title:"Accessibility Walk-Time Zones",labels:["≤5 min","≤10 min","≤15 min"],
        values:[t5,t10,t15],colors:["#198754","#ffc107","#dc3545"],unit:"zones"};
    }
    case "vegetation": {
      const b=[0,0,0,0];
      features.forEach(f=>{const p=f.properties.vegetation_pct??0;
        if(p>=50)b[0]++;else if(p>=30)b[1]++;else if(p>=15)b[2]++;else b[3]++;});
      return {title:"Vegetation Coverage Distribution",labels:["≥50%","30–50%","15–30%","<15%"],
        values:b,colors:["#27ae60","#8bc34a","#f39c12","#c0392b"],unit:"cells"};
    }
    case "traffic": {
      const b=[0,0,0];
      features.filter(f=>f.properties.type!=="hotspot").forEach(f=>{
        const c=f.properties.congestion;
        if(c==="high")b[2]++;else if(c==="medium")b[1]++;else b[0]++;});
      return {title:"Congestion Level Distribution",labels:["Low","Medium","High"],
        values:b,colors:["#2ecc71","#f39c12","#e74c3c"],unit:"cells"};
    }
    case "informal-settlement": {
      const b=[0,0,0];
      features.filter(f=>f.properties.type!=="high_irregularity_zone").forEach(f=>{
        const s=f.properties.irregularity_score??0;
        if(s<=33)b[0]++;else if(s<=66)b[1]++;else b[2]++;});
      return {title:"Irregularity Classification",labels:["Planned (0–33)","Mixed (34–66)","Informal (67–100)"],
        values:b,colors:["#2ecc71","#f39c12","#e74c3c"],unit:"cells"};
    }
    default: return null;
  }
}

function _extractScore(cards) {
  for (const c of cards) {
    const m = c.value.match(/^(\d+(?:\.\d+)?)\s*\/\s*100/);
    if (m && (c.label.toLowerCase().includes("score")||c.label.toLowerCase().includes("overall")))
      return parseFloat(m[1]);
  }
  return null;
}

function exportPDF() {
  if (!window.jspdf) { alert("PDF library not loaded. Try again in a moment."); return; }
  const { jsPDF } = window.jspdf;
  const e = _buildPdfEngine(jsPDF);
  const service = _analysis.type;
  const title   = _analysis.title || _config?.title || service;

  const rawCards  = _extractCards("tab-raw");
  const fullCards = _extractCards("tab-full");
  const gridFeats = window._lastGridGeoJSON?.features || null;
  const gridCards = gridFeats ? [
    { label:"Total Cells", value: gridFeats.length.toLocaleString() },
    { label:"Avg QoL Score", value: (() => {
        const s=gridFeats.map(f=>f.properties.qol_score).filter(x=>x!=null);
        return s.length ? Math.round(s.reduce((a,b)=>a+b,0)/s.length)+"/100" : "—";
      })() },
  ] : [];
  const overallScore = _extractScore(fullCards) ?? _analysis.score;
  const fullVis = _isRaster ? null : _computeVisuals(service, _resultBlob?.features);

  // Collect key insight text from the full tab
  const insights = Array.from(document.querySelectorAll("#tab-full .key-insight"))
    .map(el=>el.textContent.trim().replace(/^💡\s*/,"")).filter(t=>t.length>4);

  e.coverPage(title, service);
  const map = e.captureMap();
  e.addMapImage(map);

  if (rawCards.length) { e.sectionHeader("RAW DATA  /  INPUT SUMMARY"); e.cardGrid(rawCards); e.y += 3; }

  if (fullCards.length || insights.length) {
    e.sectionHeader("FULL AREA ANALYSIS");
    e.cardGrid(fullCards);
    if (overallScore != null) { e.y += 3; e.scoreGauge(overallScore); }
    if (fullVis) { e.y += 2; e.barChart(fullVis); }
    if (insights.length) { e.y += 2; insights.forEach(t=>e.insightBox(t)); }
    e.y += 3;
  }

  e.sectionHeader("GRID / CELL ANALYSIS");
  if (gridCards.length || gridFeats) {
    e.cardGrid(gridCards);
    if (gridFeats) { e.y += 2; e.scoreHeatmapStrip(gridFeats); }
    e.y += 3;
  } else {
    e.ensurePage(16);
    e.sf(e.C.panel); e.doc.rect(e.ML, e.y, e.CW, 13, "F");
    e.stc(e.C.textMuted); e.doc.setFont("helvetica","italic"); e.doc.setFontSize(8);
    e.doc.text("Grid analysis not yet generated. Open the Grid / Cell tab to compute cell scores first.", e.ML+4, e.y+7);
    e.y += 16;
  }

  e.footer(service);
  e.doc.save(`${service}_analysis_report.pdf`);
}

async function exportAIPDF() {
  if (!window.jspdf) { alert("PDF library not loaded. Try again in a moment."); return; }
  if (!_aiContext) { alert("Load the analysis result first so the AI context is available."); return; }

  const btn = document.querySelector(`[onclick="exportAIPDF()"]`);
  if (btn) { btn.textContent = "Generating…"; btn.disabled = true; }

  try {
    const res = await fetch(`${API_BASE_URL}/ai/recommendations`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({..._aiContext, lang:"en"})
    });
    if (!res.ok) throw new Error(`AI endpoint HTTP ${res.status}`);
    const data = await res.json();

    const { jsPDF } = window.jspdf;
    const e = _buildPdfEngine(jsPDF);
    const service = _analysis.type;
    const title   = _analysis.title || _config?.title || service;

    e.coverPage(`${title} — AI Report`, service);
    e.addMapImage(e.captureMap());

    const overallScore = _analysis.score;
    if (overallScore != null) { e.sectionHeader("QoL SCORE"); e.scoreGauge(overallScore); e.y += 3; }

    if (data.summary) { e.sectionHeader("AI ANALYSIS SUMMARY"); e.insightBox(data.summary); e.y += 3; }

    if (data.insights?.length) {
      e.sectionHeader("KEY INSIGHTS");
      data.insights.forEach(ins => e.insightBox(typeof ins==="string"?ins:ins.text||JSON.stringify(ins)));
      e.y += 3;
    }
    if (data.recommendations?.length) {
      e.sectionHeader("AI RECOMMENDATIONS");
      data.recommendations.forEach(r => e.insightBox(typeof r==="string"?r:r.text||JSON.stringify(r)));
      e.y += 3;
    }
    if (data.anomalies?.length) {
      e.sectionHeader("ANOMALIES DETECTED");
      data.anomalies.forEach(a => e.insightBox("⚠ "+(typeof a==="string"?a:a.text||JSON.stringify(a))));
      e.y += 3;
    }

    e.footer(service);
    e.doc.save(`${service}_ai_report.pdf`);
  } catch(err) {
    alert("Could not generate AI PDF: " + err.message);
  } finally {
    if (btn) { btn.textContent = "✦ AI PDF Report"; btn.disabled = false; }
  }
}

// ── AI Tab ────────────────────────────────────────────────────────────────────
let _aiContext = null;  // built after result loads, used by AI tab + AI PDF

async function fetchAIRecommendations() {
  const pane = document.getElementById("tab-ai");
  if (!_aiContext) {
    pane.innerHTML = `<div class="ai-placeholder">
      <div class="ai-icon">✦</div>
      <p style="font-size:14px;font-weight:600;margin-bottom:8px;">No context available</p>
      <p style="font-size:13px;color:var(--muted);">The result file must be loaded before AI recommendations can be generated.</p>
    </div>`;
    return;
  }

  pane.innerHTML = `<div class="loading-state"><div class="spinner"></div>Analysing results with AI…</div>`;

  try {
    const res = await fetch(`${API_BASE_URL}/ai/recommendations`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ..._aiContext, lang: "en" })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    let html = `<div class="tab-panel-header">✦ AI Recommendations</div>`;
    if (data.summary) html += `<div class="key-insight">💡 ${data.summary}</div>`;

    if (data.insights?.length) {
      html += `<div class="section-label">Key Insights</div>`;
      data.insights.forEach(ins => {
        html += `<div class="rec-box">${typeof ins === "string" ? ins : ins.text || JSON.stringify(ins)}</div>`;
      });
    }
    if (data.recommendations?.length) {
      html += `<div class="section-label">Recommendations</div>`;
      data.recommendations.forEach(r => {
        html += `<div class="rec-box">${typeof r === "string" ? r : r.text || JSON.stringify(r)}</div>`;
      });
    }
    if (data.anomalies?.length) {
      html += `<div class="section-label">Anomalies</div>`;
      data.anomalies.forEach(a => {
        html += `<div class="rec-box" style="border-color:rgba(231,76,60,.25);">⚠ ${typeof a === "string" ? a : a.text || JSON.stringify(a)}</div>`;
      });
    }

    if (!html) html = `<p style="color:var(--muted);font-size:13px;">AI analysis complete — no specific findings to report.</p>`;
    pane.innerHTML = html;

  } catch(e) {
    pane.innerHTML = `<div class="error-box">Could not load AI recommendations: ${e.message}<br>
      <button class="exp-btn" style="margin-top:10px;" onclick="fetchAIRecommendations()">Retry</button></div>`;
  }
}

// ── Legend render ─────────────────────────────────────────────────────────────
function renderLegend(config) {
  const card = document.getElementById("legendCard");
  const list = document.getElementById("legendList");
  card.style.display = "block";
  list.innerHTML = config.legend.map(item => `
    <div class="legend-chip">
      <div class="legend-dot" style="background:${item.color};"></div>
      <span class="legend-label">${item.label}</span>
      <span class="legend-range">${item.range}</span>
    </div>`).join("");
}

// ── Main loader ───────────────────────────────────────────────────────────────
async function loadAnalysisDetails() {
  initMap();

  try {
    const username = localStorage.getItem("username") || "default";
    const res  = await fetch(`${API_BASE_URL}/analyses?username=${username}`);
    const data = await res.json();
    _analysis  = data.find(a => String(a.id) === String(analysisId));

    if (!_analysis) {
      document.getElementById("analysisTitle").textContent = "Analysis not found";
      document.getElementById("analysisMeta").textContent  = "This record does not exist or has been deleted.";
      return;
    }

    _config   = ANALYSIS_CONFIG[_analysis.type];
    _isRaster = _config?.isRaster ?? false;

    // ── Header ──
    const typeLabel   = ANALYSIS_LABELS?.[_analysis.type]?.en || _config?.title || _analysis.type;
    const hasCustom   = _analysis.title && _analysis.title !== typeLabel;
    document.getElementById("analysisTitle").textContent = _analysis.title || typeLabel;
    const subParts = [];
    if (hasCustom) subParts.push(typeLabel);
    if (_analysis.project_name) subParts.push(_analysis.project_name);
    subParts.push(new Date(_analysis.created_at).toLocaleString());
    document.getElementById("analysisMeta").textContent = subParts.join("  ·  ");

    // Score pill
    const sc = _analysis.score, st = _analysis.status || "mid";
    if (sc != null) {
      const pill = document.getElementById("scorePill");
      pill.style.display = "inline-flex";
      pill.className = `score-pill ${st}`;
      pill.textContent = `${sc} / 100`;
    }

    // ── Metadata sidebar ──
    document.getElementById("metaType").textContent    = _config?.title || _analysis.type;
    document.getElementById("metaDate").textContent    = new Date(_analysis.created_at).toLocaleString();
    document.getElementById("metaFormat").textContent  = _config?.dataFormat || "—";
    document.getElementById("metaScore").textContent   = sc != null ? `${sc} / 100` : "—";
    document.getElementById("metaProject").textContent = _analysis.project_name || "Unassigned";

    // ── Expansion: special view ──
    if (_analysis.type === "expansion") {
      document.getElementById("mapTabBar").style.display = "none";
      document.getElementById("analysisMap").style.cssText =
        "display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1117,#1a2332);height:460px;";
      document.getElementById("analysisMap").innerHTML = `
        <div class="expansion-score">
          <div class="big">${sc ?? "—"}</div>
          <div class="sub">Expansion Suitability Score / 100</div>
          <div style="font-size:13px;margin-top:6px;" class="page-sub">${_analysis.area||"Urban expansion analysis"}</div>
        </div>`;
      document.getElementById("tab-full").innerHTML = `
        <div class="stats-grid">
          ${sb("Score", sc != null ? `<span style="color:${scoreColor(sc)}">${sc} / 100</span>` : "—")}
          ${sb("Status", (st).toUpperCase())}
        </div>
        <div class="rec-box" style="margin-top:8px;">Expansion analysis identifies optimal urban growth zones based on composite quality of life scores.</div>`;
      document.getElementById("tab-raw").innerHTML = `<p style="color:var(--muted);font-size:13px;">Input files are not stored for expansion analysis.</p>`;
      return;
    }

    // ── Unknown type ──
    if (!_config) {
      document.getElementById("tab-full").innerHTML =
        `<div class="error-box">Analysis type "<strong>${_analysis.type}</strong>" is not yet configured.</div>`;
      return;
    }

    // ── Legend + Export ──
    renderLegend(_config);
    buildExportButtons(_isRaster);

    // ── Sanitize result file path ──
    const resultFile = sanitizeResultFile(_analysis.result_file);
    if (!resultFile) {
      document.getElementById("tab-full").innerHTML =
        `<div class="error-box">No result file available for this analysis. Run it again to regenerate.</div>`;
      document.getElementById("tab-raw").innerHTML =
        `<div class="error-box">No result file saved.</div>`;
      return;
    }
    _analysis.result_file = resultFile;
    const url = `${API_BASE_URL}/${resultFile}`;

    // Show the tab bar over the map
    document.getElementById("mapTabBar").style.display = "flex";

    if (_isRaster) await loadRasterAnalysis(url);
    else           await loadVectorAnalysis(url);

    setTimeout(() => { if (_map) _map.invalidateSize(); }, 400);

  } catch(err) {
    console.error("loadAnalysisDetails error:", err);
    document.getElementById("analysisTitle").textContent = "Error loading analysis";
    document.getElementById("analysisMeta").textContent  = err.message;
  }
}

async function loadRasterAnalysis(url) {
  try {
    const { layer, georaster } = await loadRaster(url, _config, false);
    _resultLayer = layer;
    _resultLayer.addTo(_map);
    fitLayer(_resultLayer);

    const rawData = await loadRaster(url, _config, true);
    _rawLayer = rawData.layer;

    const min  = georaster.mins?.[0] ?? 0;
    const max  = georaster.maxs?.[0] ?? 1;
    const mean = (min + max) / 2;

    const fullArea = _config.buildFullArea(georaster);
    const recs     = _config.recommendations(fullArea.score);

    // Build AI context (mirrors dashboard's lastAnalysisContext)
    _aiContext = {
      service:       _analysis.type,
      service_label: _config.title,
      inputs:        { file: _analysis.result_file },
      full_area:     { min_value: min, max_value: max, mean_value: mean },
      grid:          null,
    };

    document.getElementById("tab-full").innerHTML =
      `<div class="tab-panel-header">Full Area Analysis</div>` +
      fullArea.html +
      `<div class="section-label">Recommendations</div>` +
      recs.map(r => `<div class="rec-box">${r}</div>`).join("");

    document.getElementById("tab-raw").innerHTML =
      `<div class="tab-panel-header">Raw Data / File Metadata</div>` +
      `<div class="stats-grid">${_config.buildRaw(georaster)}</div>` +
      `<div class="key-insight">💡 This tab shows the raw raster with a greyscale gradient on the map.</div>`;

  } catch(err) {
    document.getElementById("tab-full").innerHTML =
      `<div class="error-box">Failed to load raster: ${err.message}</div>`;
  }
}

async function loadVectorAnalysis(url) {
  try {
    const { layer, geojson, features } = await loadVector(url, _config);
    _resultLayer = layer;
    _resultLayer.addTo(_map);
    fitLayer(_resultLayer);
    _resultBlob = geojson;

    // Raw tab layer:
    // - Services with a dedicated input layer (public-transport, facility-accessibility)
    //   show boundary outline + station/facility points — same as dashboard Raw tab
    // - All other services show the same styled result layer (no grey wash)
    if (_config.buildInputLayer) {
      const inputLayer = _config.buildInputLayer(geojson);
      _rawLayer = inputLayer || _resultLayer;
    } else {
      // Re-render with the full style so Raw tab is identical to Full tab visually
      // but uses the plain GeoJSON renderer (no custom buildLayer) for simplicity
      _rawLayer = L.geoJSON(geojson, {
        style: f => _config.styleFeature ? _config.styleFeature(f) : { fillColor:"#00d4aa", fillOpacity:0.5, color:"#333", weight:1 },
        pointToLayer: _config.pointToLayer ? (f,ll) => _config.pointToLayer(f,ll) : undefined,
        onEachFeature: (f,l) => {
          const props = Object.entries(f.properties||{}).slice(0,8).map(([k,v]) => `<b>${k}:</b> ${v}`).join("<br>");
          l.bindPopup(`<div style="font-size:11px;max-height:150px;overflow:auto;">${props}</div>`);
        }
      });
    }

    const fullArea  = _config.buildFullArea(features);
    const usedScore = fullArea.useDbScore ? (_analysis.score || fullArea.score) : fullArea.score;
    const recs      = _config.recommendations(usedScore || 50);

    // Build AI context from feature statistics
    const densities = features.map(f => f.properties.crime_density || f.properties.coverage_pct || f.properties.density || f.properties.pop_density || f.properties.vegetation_pct || 0).filter(v => !isNaN(v));
    const avgVal = densities.length ? densities.reduce((a,b)=>a+b,0)/densities.length : null;
    _aiContext = {
      service:       _analysis.type,
      service_label: _config.title,
      inputs:        { file: _analysis.result_file },
      full_area:     { feature_count: features.length, avg_value: avgVal, score: usedScore },
      grid:          null,
    };

    document.getElementById("tab-full").innerHTML =
      `<div class="tab-panel-header">Full Area Analysis</div>` +
      fullArea.html +
      `<div class="section-label">Recommendations</div>` +
      recs.map(r => `<div class="rec-box">${r}</div>`).join("");

    const rawDesc = _config.buildInputLayer
      ? "This tab shows the input boundary and station/facility points on the map."
      : "This tab shows the result data with its full styling on the map.";
    document.getElementById("tab-raw").innerHTML =
      `<div class="tab-panel-header">Raw Data</div>` +
      `<div class="stats-grid">${_config.buildRaw(features)}</div>` +
      `<div class="key-insight">💡 ${rawDesc}</div>`;

  } catch(err) {
    document.getElementById("tab-full").innerHTML =
      `<div class="error-box">Failed to load result: ${err.message}</div>`;
  }
}

loadAnalysisDetails();
</script>
