<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Malaz · Analysis Details</title>
  <link type="image/png" sizes="16x16" rel="icon" href="https://img.icons8.com/isometric-line/50/ffffff/building.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; min-height:100vh; }

    /* ── Shared navbar ── */
    .navbar-app {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:0 20px; height:56px; flex-shrink:0; position:sticky; top:0; z-index:200;
    }
    .navbar-app .brand {
      display:flex; align-items:center; gap:10px;
      font-weight:600; font-size:15px; color:var(--accent); text-decoration:none;
    }
    .navbar-app .nav-actions { display:flex; align-items:center; gap:8px; }
    .nav-btn {
      background:none; border:1px solid var(--border2); color:var(--muted);
      padding:6px 14px; border-radius:8px; font-family:inherit; font-size:13px;
      cursor:pointer; transition:.15s;
    }
    .nav-btn:hover { border-color:var(--accent); color:var(--accent); }
    .nav-btn.icon-btn { width:36px; height:36px; padding:0; display:flex; align-items:center; justify-content:center; font-size:16px; }
    .user-menu-wrap { position:relative; }
    .user-menu-wrap .dropdown {
      position:absolute; right:0; top:calc(100% + 6px);
      background:var(--surface); border:1px solid var(--border2);
      border-radius:10px; min-width:160px; box-shadow:0 10px 30px rgba(0,0,0,.35);
      display:none; z-index:300;
    }
    .user-menu-wrap.open .dropdown { display:block; }
    .user-menu-wrap .dropdown a {
      display:block; padding:10px 14px; color:var(--text);
      font-size:13px; text-decoration:none;
    }
    .user-menu-wrap .dropdown a:hover { color:var(--accent); }

    /* ── Page shell ── */
    .page { max-width:1600px; margin:0 auto; padding:24px 28px 48px; }

    /* ── Top bar ── */
    .topbar { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
    .back-btn { display:flex; align-items:center; gap:6px; padding:8px 16px; background:var(--surface2); border:1px solid var(--border); color:var(--muted); border-radius:10px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:500; transition:.15s; flex-shrink:0; }
    .back-btn:hover { border-color:var(--accent); color:var(--accent); }
    .page-title { font-size:26px; font-weight:700; line-height:1.2; }
    .page-sub { font-size:13px; color:var(--muted); margin-top:3px; }

    /* ── Score pill in header ── */
    .score-pill { display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:20px; font-size:13px; font-weight:700; flex-shrink:0; margin-left:auto; }
    .score-pill.high { background:rgba(46,204,113,.15); color:#2ecc71; border:1px solid rgba(46,204,113,.28); }
    .score-pill.mid  { background:rgba(240,165,0,.15);  color:#f0a500; border:1px solid rgba(240,165,0,.28); }
    .score-pill.low  { background:rgba(231,76,60,.15);  color:#e74c3c; border:1px solid rgba(231,76,60,.28); }

    /* ── Main layout: map top, content below ── */
    .map-section { position:relative; border-radius:16px; overflow:hidden; border:1px solid var(--border); margin-bottom:20px; background:var(--surface); }
    #analysisMap { width:100%; height:500px; }

    /* ── Tab bar sits directly on top of map (inside map-section, absolute) ── */
    .map-tab-bar {
      position:absolute; top:12px; left:50%; transform:translateX(-50%);
      display:flex; gap:4px;
      background:var(--surface); backdrop-filter:blur(10px);
      border:1px solid var(--border2); border-radius:12px; padding:4px;
      z-index:500;
      opacity:.95;
    }
    .map-tab { padding:7px 16px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; color:var(--muted); transition:.15s; white-space:nowrap; user-select:none; }
    .map-tab:hover { color:var(--text); }
    .map-tab.active { background:var(--accent); color:#08110f; }

    /* ── Content row below map ── */
    .content-row { display:grid; grid-template-columns:1fr 320px; gap:20px; align-items:start; }

    /* ── Card ── */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; }

    /* ── Insight cards (2-col grid inside tabs) ── */
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .stat-box { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
    .stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
    .stat-value { font-size:17px; font-weight:700; color:var(--accent); line-height:1.25; }

    /* ── Key insight / rec boxes ── */
    .key-insight { background:rgba(76,194,255,.07); border-left:3px solid var(--accent); border-radius:6px; padding:10px 13px; margin:12px 0; font-size:13px; line-height:1.6; color:var(--text); }
    .rec-box { background:rgba(0,212,170,.07); border:1px solid rgba(0,212,170,.18); border-radius:10px; padding:10px 13px; margin-bottom:8px; font-size:13px; line-height:1.6; color:var(--text); }

    /* ── Section label inside tab ── */
    .section-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin:16px 0 8px; padding-bottom:5px; border-bottom:1px solid var(--border); }

    /* ── Tab panel header ── */
    .tab-panel-header { font-size:14px; font-weight:600; color:var(--text); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .tab-panel-header::before { content:''; display:inline-block; width:3px; height:16px; background:var(--accent); border-radius:2px; flex-shrink:0; }

    /* ── Legend (compact horizontal chips inside sidebar) ── */
    .legend-chip { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); margin-bottom:5px; }
    .legend-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
    .legend-label { font-size:12px; color:var(--text); flex:1; }
    .legend-range { font-size:11px; color:var(--muted); white-space:nowrap; }

    /* ── Meta list (compact) ── */
    .meta-list { display:flex; flex-direction:column; gap:0; }
    .meta-row { display:flex; justify-content:space-between; align-items:baseline; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .meta-row:last-child { border-bottom:none; padding-bottom:0; }
    .meta-key { font-size:12px; color:var(--muted); flex-shrink:0; }
    .meta-val { font-size:12px; color:var(--text); text-align:right; max-width:160px; word-break:break-word; font-weight:500; }

    /* ── Export buttons ── */
    .export-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .exp-btn { padding:9px 10px; border-radius:9px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border2); background:var(--surface2); color:var(--text); font-family:inherit; transition:.15s; text-align:center; }
    .exp-btn:hover { border-color:var(--accent); color:var(--accent); }
    .exp-btn.accent { background:var(--accent); color:#fff; border-color:var(--accent); grid-column:span 2; }
    .exp-btn.accent:hover { opacity:.88; }

    /* ── Loading / error ── */
    .loading-state { display:flex; flex-direction:column; align-items:center; padding:30px 0; color:var(--muted); font-size:13px; gap:10px; }
    .spinner { width:26px; height:26px; border:3px solid rgba(0,212,170,.2); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .error-box { padding:16px; color:#e74c3c; font-size:13px; border:1px solid rgba(231,76,60,.22); border-radius:10px; line-height:1.5; }

    /* ── Expansion score display ── */
    .expansion-score { text-align:center; padding:50px 20px; }
    .expansion-score .big { font-size:88px; font-weight:800; color:var(--accent); line-height:1; }
    .expansion-score .sub { font-size:15px; color:var(--muted); margin-top:8px; }

    /* ── Grid / AI tabs ── */
    .grid-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .ai-placeholder { text-align:center; padding:26px 10px; }
    .ai-icon { font-size:28px; margin-bottom:10px; }
    .ai-badge { display:inline-block; margin-top:12px; padding:4px 12px; border-radius:20px; background:rgba(0,212,170,.1); color:var(--accent); font-size:11px; font-weight:600; border:1px solid rgba(0,212,170,.2); }

    /* ── Sidebar section title ── */
    .sidebar-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }

    @media(max-width:960px) {
      .page { padding:16px; }
      #analysisMap { height:320px; }
      .content-row { grid-template-columns:1fr; }
      .map-tab-bar { position:relative; top:auto; left:auto; transform:none; border-radius:0; border:none; border-bottom:1px solid var(--border); background:var(--surface); backdrop-filter:none; justify-content:center; }
    }

    /* ── Map controls toolbar (top-left, identical to dashboard) ── */
    .map-controls {
      position:absolute; top:12px; left:12px;
      display:flex; align-items:center; gap:6px; z-index:600; flex-wrap:wrap;
    }
    .map-controls .mc-btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 10px; font-size:12px; font-weight:500;
      background:rgba(15,20,24,.82); border:1px solid rgba(255,255,255,.18);
      color:#e2e8f0; border-radius:8px; cursor:pointer;
      font-family:inherit; transition:.15s; white-space:nowrap;
      backdrop-filter:blur(6px);
    }
    .map-controls .mc-btn:hover { border-color:var(--accent); color:var(--accent); }
    .mc-btn-active { background:var(--accent)!important; color:#06212e!important; border-color:var(--accent)!important; }

    /* basemap / export dropdown menus */
    .mc-menu { position:relative; }
    .mc-menu .mc-dropdown {
      position:absolute; top:calc(100% + 4px); left:0;
      background:var(--surface,#1a1d27); border:1px solid var(--border,rgba(255,255,255,.12));
      border-radius:10px; min-width:130px;
      box-shadow:0 10px 30px rgba(0,0,0,.4); display:none; z-index:700;
    }
    .mc-menu.open .mc-dropdown { display:block; }
    .mc-menu .mc-dropdown a {
      display:block; padding:9px 14px; color:var(--text,#e2e8f0);
      font-size:13px; text-decoration:none;
    }
    .mc-menu .mc-dropdown a:hover { color:var(--accent,#00d4aa); }

    /* measure readout */
    .measure-total {
      background:rgba(15,20,24,.88); color:#4cc2ff;
      font-size:11px; font-weight:600; padding:3px 8px;
      border-radius:4px; border:1px solid rgba(76,194,255,.35);
      white-space:nowrap; display:flex; align-items:center; gap:8px;
    }
    .measure-clear-btn {
      background:transparent; border:1px solid rgba(76,194,255,.35);
      color:#4cc2ff; font-size:10px; padding:1px 6px; border-radius:3px; cursor:pointer;
    }
    .measure-label {
      background:rgba(15,20,24,.82); color:#4cc2ff; font-size:11px; font-weight:600;
      padding:2px 6px; border-radius:4px; border:1px solid rgba(76,194,255,.35);
      white-space:nowrap; pointer-events:none; transform:translate(-50%,-130%); display:inline-block;
    }

    /* annotate toolbar */
    .annotate-toolbar {
      display:none; align-items:center; gap:4px;
      background:rgba(15,20,24,.88); border:1px solid rgba(255,255,255,.12);
      border-radius:8px; padding:4px 8px; backdrop-filter:blur(6px);
    }
    .annotate-toolbar.visible { display:flex; }
    .annotate-color-btn {
      width:18px; height:18px; border-radius:50%; border:2px solid transparent; cursor:pointer; padding:0;
    }
    .annotate-color-btn.selected { border-color:#fff; transform:scale(1.15); }
    .annotate-eraser-btn {
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15);
      border-radius:5px; cursor:pointer; padding:2px 4px; display:flex; align-items:center;
    }
    .annotate-eraser-btn.selected { background:rgba(76,194,255,.18); border-color:#4cc2ff; }
    .annotate-sep { width:1px; height:18px; background:rgba(255,255,255,.15); margin:0 2px; }
    .annotate-clear-btn {
      background:transparent; border:none; cursor:pointer; padding:2px 4px;
      display:flex; align-items:center; border-radius:4px;
    }

    /* ── HUD: scale bar + coordinates (bottom of map) ── */
    .map-hud {
      position:absolute; bottom:10px; left:10px; right:10px;
      display:flex; align-items:flex-end; justify-content:space-between;
      pointer-events:none; z-index:600;
    }
    .map-scale-bar { display:flex; flex-direction:column; align-items:flex-start; gap:2px; }
    .map-scale-line {
      height:4px; min-width:40px; background:#4cc2ff;
      border:1px solid #4cc2ff; border-top:none;
      border-left:2px solid #4cc2ff; border-right:2px solid #4cc2ff;
    }
    .map-scale-label {
      font-size:10px; font-weight:600; color:#4cc2ff;
      background:rgba(15,20,24,.72); padding:1px 4px; border-radius:3px; white-space:nowrap;
    }
    .map-coords {
      font-size:11px; font-weight:500; color:#4cc2ff;
      background:rgba(15,20,24,.72); padding:3px 8px; border-radius:4px;
      white-space:nowrap; font-variant-numeric:tabular-nums;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar-app">
  <a href="dashboard.html" class="brand">
    <img width="36" height="36" src="https://img.icons8.com/isometric-line/50/4cc2ff/building.png" alt="Malaz"/>
    Malaz · Urban Quality of Life
  </a>
  <div class="nav-actions">
    <button class="nav-btn" onclick="window.location.href='dashboard.html'">
      <img width="18" height="18" src="https://img.icons8.com/material/24/FFFFFF/map-marker.png" alt="map" class="nav-icon" style="vertical-align:middle;margin-right:5px;"/>Dashboard
    </button>
    <button class="nav-btn" onclick="window.location.href='profile_1.html'">
      <img width="18" height="18" src="https://img.icons8.com/material/24/FFFFFF/activity-history.png" alt="history" class="nav-icon" style="vertical-align:middle;margin-right:5px;"/>History
    </button>
    <button class="nav-btn" onclick="toggleLang()" id="langBtn">
      <img width="20" height="20" src="https://img.icons8.com/material/24/FFFFFF/language.png" alt="lang" class="nav-icon" style="vertical-align:middle;margin-right:5px;"/>العربية
    </button>
    <button class="nav-btn icon-btn theme-toggle" onclick="toggleTheme()" title="Switch theme">☀️</button>
    <button class="nav-btn" onclick="window.open('https://arcg.is/0v4DT0', '_blank')" title="Feedback">
      <img width="20" height="20" src="https://img.icons8.com/material/24/FFFFFF/feedback.png" alt="feedback" class="nav-icon" style="vertical-align:middle;margin-right:5px;"/>Feedback
    </button>
    <div class="user-menu-wrap" id="userMenuWrap">
      <button class="nav-btn" onclick="document.getElementById('userMenuWrap').classList.toggle('open')">
        <img width="20" height="20" src="https://img.icons8.com/material-rounded/24/FFFFFF/name.png" alt="user" class="nav-icon" style="vertical-align:middle;margin-right:5px;"/>Profile ▾
      </button>
      <div class="dropdown">
        <a href="profile_1.html">Profile</a>
        <a href="#" onclick="logout(); return false;">Logout</a>
      </div>
    </div>
  </div>
</nav>

<div class="page">

  <!-- Top bar -->
  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='profile_1.html'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      History
    </button>
    <div>
      <div class="page-title" id="analysisTitle">Loading…</div>
      <div class="page-sub"   id="analysisMeta"></div>
    </div>
    <div class="score-pill mid" id="scorePill" style="display:none;"></div>
  </div>

  <!-- Map with floating tab bar -->
  <div class="map-section">
    <div id="analysisMap"></div>

    <!-- Map controls toolbar (top-left) -->
    <div class="map-controls">
      <div class="mc-menu" id="basemapMenu">
        <button class="mc-btn" onclick="toggleBasemapMenu()">
          <img width="20" height="20" src="https://img.icons8.com/cotton/64/map.png" alt="map"/>
          <span>Basemap</span><span>▾</span>
        </button>
        <div class="mc-dropdown">
          <a href="#" onclick="changeBasemap('light');  return false;">☀️ Light</a>
          <a href="#" onclick="changeBasemap('dark');   return false;">🌙 Dark</a>
          <a href="#" onclick="changeBasemap('voyager');return false;">🗺️ Voyager</a>
        </div>
      </div>

      <button class="mc-btn" id="measureBtn" onclick="toggleMeasure()">
        <img width="20" height="20" src="https://img.icons8.com/material/24/FFFFFF/ruler--v1.png" alt="ruler--v1"/>Measure
      </button>
      <div id="measureTotal" class="measure-total" style="display:none;"></div>

      <button class="mc-btn" id="annotateBtn" onclick="toggleAnnotate()">
        <img width="20" height="20" src="https://img.icons8.com/windows/32/FFFFFF/sign-up.png" alt="sign-up"/>Annotate
      </button>
      <div id="annotateToolbar" class="annotate-toolbar">
        <button class="annotate-color-btn selected" style="background:#e74c3c;" onclick="annotateSelectTool('color','#e74c3c',this)"></button>
        <button class="annotate-color-btn" style="background:#f39c12;" onclick="annotateSelectTool('color','#f39c12',this)"></button>
        <button class="annotate-color-btn" style="background:#f1c40f;" onclick="annotateSelectTool('color','#f1c40f',this)"></button>
        <button class="annotate-color-btn" style="background:#2ecc71;" onclick="annotateSelectTool('color','#2ecc71',this)"></button>
        <button class="annotate-color-btn" style="background:#3498db;" onclick="annotateSelectTool('color','#3498db',this)"></button>
        <button class="annotate-color-btn" style="background:#ffffff;" onclick="annotateSelectTool('color','#ffffff',this)"></button>
        <div class="annotate-sep"></div>
        <button class="annotate-eraser-btn" id="annotateEraserBtn" onclick="annotateSelectTool('eraser',null,this)">
          <img width="18" height="18" src="https://img.icons8.com/deco-glyph/48/FFFFFF/eraser.png" alt="eraser"/>
        </button>
        <div class="annotate-sep"></div>
        <button class="annotate-clear-btn" onclick="annotateClearAll()">
          <img width="18" height="18" src="https://img.icons8.com/ios-filled/50/FA5252/delete-forever.png" alt="delete-forever"/>
        </button>
      </div>

      <div class="mc-menu" id="exportMenu">
        <button class="mc-btn" id="export-btn" onclick="toggleExportMenu()">
          <img width="20" height="20" src="https://img.icons8.com/ios-filled/50/FFFFFF/download--v1.png" alt="download--v1"/>Export<span>▾</span>
        </button>
        <div class="mc-dropdown">
          <a href="#" onclick="exportMap('png');  toggleExportMenu(); return false;">🖼️ PNG</a>
          <a href="#" onclick="exportMap('jpg');  toggleExportMenu(); return false;">📷 JPG</a>
          <a href="#" onclick="exportMap('jpeg'); toggleExportMenu(); return false;">📷 JPEG</a>
          <a href="#" onclick="exportMap('tiff'); toggleExportMenu(); return false;">🗺️ TIFF</a>
        </div>
      </div>
    </div>

    <!-- HUD: scale bar + coordinates -->
    <div class="map-hud">
      <div class="map-scale-bar">
        <div class="map-scale-line" id="mapScaleLine"></div>
        <span class="map-scale-label" id="mapScaleLabel"></span>
      </div>
      <div class="map-coords" id="mapCoords">— , —</div>
    </div>

    <!-- Tab bar floats over the map -->
    <div class="map-tab-bar" id="mapTabBar" style="display:none;">
      <div class="map-tab active" data-tab="full"  onclick="selectTab('full')">Full Analysis</div>
      <div class="map-tab"        data-tab="raw"   onclick="selectTab('raw')">Raw Data</div>
      <div class="map-tab"        data-tab="grid"  onclick="selectTab('grid')">Grid / Cell</div>
      <div class="map-tab"        data-tab="ai"    onclick="selectTab('ai')">✦ AI</div>
    </div>
  </div>

  <!-- Content row: insights panel + sidebar -->
  <div class="content-row">

    <!-- Left: tab content panel -->
    <div class="card" id="tabPanel">
      <div id="tab-full"  class="tab-pane active"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
      <div id="tab-raw"   class="tab-pane" style="display:none;"></div>
      <div id="tab-grid"  class="tab-pane" style="display:none;"></div>
      <div id="tab-ai" class="tab-pane" style="display:none;">
        <div class="loading-state" style="padding:20px 0;">
          <div class="ai-icon">✦</div>
          <p style="font-size:13px;color:var(--muted);margin-top:8px;">Click the ✦ AI tab to generate recommendations.</p>
        </div>
      </div>
    </div>

    <!-- Right: sidebar (legend + metadata + export) -->
    <div style="display:flex;flex-direction:column;gap:14px;">

      <!-- Legend -->
      <div class="card" id="legendCard" style="display:none;">
        <div class="sidebar-title">Legend</div>
        <div id="legendList"></div>
      </div>

      <!-- Metadata -->
      <div class="card">
        <div class="sidebar-title">Analysis Info</div>
        <div class="meta-list">
          <div class="meta-row"><span class="meta-key">Type</span><span class="meta-val" id="metaType">—</span></div>
          <div class="meta-row"><span class="meta-key">Date</span><span class="meta-val" id="metaDate">—</span></div>
          <div class="meta-row"><span class="meta-key">Format</span><span class="meta-val" id="metaFormat">—</span></div>
          <div class="meta-row"><span class="meta-key">Score</span><span class="meta-val" id="metaScore">—</span></div>
          <div class="meta-row"><span class="meta-key">Project</span><span class="meta-val" id="metaProject">—</span></div>
        </div>
      </div>

      <!-- Export -->
      <div class="card" id="exportCard" style="display:none;">
        <div class="sidebar-title">Export</div>
        <div class="export-grid" id="exportGrid"></div>
      </div>

    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script src="js/config.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/georaster"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet/dist/georaster-layer-for-leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

// API_BASE_URL already declared by app.js — no redeclaration needed

const params     = new URLSearchParams(window.location.search);
const analysisId = params.get("id");

// ── State ─────────────────────────────────────────────────────────────────────
let _map          = null;
let _resultLayer  = null;  // Full Analysis layer
let _gridLayer    = null;  // Grid / Cell layer
let _rawLayer     = null;  // Raw data layer (same file, grey colorFn for raster)
let _resultBlob   = null;  // ArrayBuffer (raster) or GeoJSON object (vector)
let _analysis     = null;
let _config       = null;
let _isRaster     = false;
let _gridLoaded   = false;
let _currentMapLayer = "full";

// ── Colour helpers (must be before ANALYSIS_CONFIG) ───────────────────────────
function vegPctColor(pct) {
  const p = Math.max(0, Math.min(100, pct));
  if (p >= 50) { const t=(p-50)/50; return `rgba(${Math.round((1-t)*80+t*30)},${Math.round((1-t)*180+t*160)},50,0.85)`; }
  if (p >= 30) { const t=(p-30)/20; return `rgba(${Math.round((1-t)*230+t*80)},${Math.round((1-t)*200+t*180)},0,0.85)`; }
  const t=p/30; return `rgba(${Math.round((1-t)*200+t*230)},${Math.round((1-t)*40+t*160)},0,0.85)`;
}
function irregularityColor(score) {
  if (score==null||score===undefined) return "rgba(150,150,150,0.3)";
  const s=Math.max(0,Math.min(100,score));
  if (s<=33) { const t=s/33; return `rgba(${Math.round((1-t)*46+t*240)},${Math.round((1-t)*180+t*200)},${Math.round((1-t)*50)},0.72)`; }
  if (s<=66) { const t=(s-33)/33; return `rgba(${Math.round((1-t)*240+t*220)},${Math.round((1-t)*200+t*60)},0,0.72)`; }
  const t=(s-66)/34; return `rgba(${Math.round((1-t)*220+t*180)},${Math.round((1-t)*60+t*20)},0,0.72)`;
}
const FACILITY_ZONE_COLORS = ["#198754","#52b788","#ffc107","#fd7e14","#dc3545","#9b2335","#6f42c1","#343a40"];

// ── Type configuration ────────────────────────────────────────────────────────
const ANALYSIS_CONFIG = {

  "ndvi": {
    title:"NDVI Analysis", dataFormat:"GeoTIFF", isRaster:true,
    gridField:"geotiff",
    legend:[
      { color:"#1a9641", label:"Dense Vegetation",      range:"NDVI > 0.6" },
      { color:"#a6d96a", label:"Moderate Vegetation",   range:"NDVI 0.4 – 0.6" },
      { color:"#ffffbf", label:"Sparse Vegetation",     range:"NDVI 0.2 – 0.4" },
      { color:"#d9a85a", label:"Bare Soil",             range:"NDVI 0 – 0.2" },
      { color:"#4575b4", label:"Water / No Vegetation", range:"NDVI < 0" }
    ],
    colorFn(v, min, max) {
      if (v == null || isNaN(v) || v < -1.5 || v > 1.5) return null;
      const range = (max - min) || 1;
      const t = Math.max(0, Math.min(1, (v - min) / range));
      let r, g, b;
      if (t < 0.5) { const s = t / 0.5; r = Math.round(200 - s*20); g = Math.round(20 + s*180); b = 0; }
      else { const s = (t-0.5)/0.5; r = Math.round(180 - s*180); g = Math.round(200 - s*50); b = 0; }
      return `rgba(${r},${g},${b},0.9)`;
    },
    buildFullArea(georaster) {
      const min  = georaster.mins?.[0] ?? 0;
      const max  = georaster.maxs?.[0] ?? 1;
      const mean = (min + max) / 2;
      const score = Math.max(0, Math.min(100, Math.round(((mean + 0.2) / 0.8) * 100)));
      const vegClass = mean >= 0.5 ? { label:"Dense / Healthy Vegetation", color:"#27ae60" }
        : mean >= 0.2 ? { label:"Moderate Vegetation", color:"#f39c12" }
        : mean >= 0.0 ? { label:"Sparse / Stressed", color:"#e67e22" }
        : { label:"Bare Soil / Built-up", color:"#e74c3c" };
      const insight = mean >= 0.4 ? `Mean NDVI of ${mean.toFixed(3)} indicates healthy and abundant vegetation.`
        : mean >= 0.2 ? `Moderate vegetation (mean NDVI ${mean.toFixed(3)}). Some zones may need greening.`
        : `Low mean NDVI (${mean.toFixed(3)}) — the area is mostly bare or built-up.`;
      return { html: `
        <div class="stats-grid">
          ${sb("Overall Score", `<span style="color:${scoreColor(score)}">${score} / 100</span>`)}
          ${sb("Vegetation Health", `<span style="color:${vegClass.color};font-size:13px;">${vegClass.label}</span>`)}
          ${sb("Mean NDVI", mean.toFixed(4))}
          ${sb("Min NDVI",  min.toFixed(4))}
          ${sb("Max NDVI",  max.toFixed(4))}
          ${sb("Image Size", `${georaster.width} × ${georaster.height} px`)}
        </div>
        <div class="key-insight">💡 ${insight}</div>
      `, score };
    },
    buildRaw(georaster) {
      return `
        ${sb("Format", "GeoTIFF (single band)")}
        ${sb("Size", `${georaster.width} × ${georaster.height} px`)}
        ${sb("Min Value", (georaster.mins?.[0] ?? "—").toString())}
        ${sb("Max Value", (georaster.maxs?.[0] ?? "—").toString())}
        ${sb("Projection", `EPSG:${georaster.projection ?? "—"}`)}
        ${sb("No-Data",    georaster.noDataValue ?? "None")}
      `;
    },
    recommendations(score) {
      if (score >= 75) return ["Dense vegetation coverage is healthy.", "Monitor for seasonal changes.", "Consider expanding green corridors."];
      if (score >= 40) return ["Moderate vegetation needs targeted improvement.", "Prioritize planting in sparse zones.", "Use grid analysis to locate lowest-NDVI cells."];
      return ["Critical lack of vegetation detected.", "Initiate urban greening programs immediately.", "Coordinate with municipality on tree-planting targets."];
    }
  },

  "heat-index": {
    title:"Heat Index Analysis", dataFormat:"GeoTIFF", isRaster:true,
    gridField:"geotiff",
    legend:[
      { color:"#4cc2ff", label:"Cool",          range:"Class 0" },
      { color:"#8bc34a", label:"Comfortable",   range:"Class 1" },
      { color:"#f0a500", label:"Caution",       range:"Class 2" },
      { color:"#e74c3c", label:"Extreme Heat",  range:"Class 3" }
    ],
    colorFn(v) {
      if (v == null || isNaN(v) || v === -9999) return null;
      if (v === 0) return "rgba(76,194,255,0.85)";
      if (v === 1) return "rgba(139,195,74,0.85)";
      if (v === 2) return "rgba(240,165,0,0.85)";
      if (v === 3) return "rgba(231,76,60,0.85)";
      return null;
    },
    buildFullArea(georaster) {
      const min  = georaster.mins?.[0] ?? 0;
      const max  = georaster.maxs?.[0] ?? 3;
      const mean = (min + max) / 2;
      const heatScore = Math.max(0, Math.min(100, Math.round((1 - mean / 3) * 100)));
      const heatClass = mean < 0.5 ? "Comfortable" : mean < 1.5 ? "Caution" : mean < 2.5 ? "Extreme Caution" : "Danger";
      const classColor = mean < 0.5 ? "#4cc2ff" : mean < 1.5 ? "#8bc34a" : mean < 2.5 ? "#f0a500" : "#e74c3c";
      const insight = mean >= 2.5 ? `Dangerous heat conditions dominate this area. Urgent cooling interventions needed.`
        : mean >= 1.5 ? `High heat stress across significant portions. Green spaces or cool corridors could help.`
        : mean >= 0.5 ? `Moderate heat detected. Some zones may benefit from shade or cooling infrastructure.`
        : `Thermal comfort is good across most of the area.`;
      return { html: `
        <div class="stats-grid">
          ${sb("Overall Score",   `<span style="color:${scoreColor(heatScore)}">${heatScore} / 100</span>`)}
          ${sb("Thermal Class",   `<span style="color:${classColor}">${heatClass}</span>`)}
          ${sb("Mean Class",      mean.toFixed(2) + " (0=Cool · 3=Extreme)")}
          ${sb("Image Size",      `${georaster.width} × ${georaster.height} px`)}
        </div>
        <div class="key-insight">💡 ${insight}</div>
      `, score: heatScore };
    },
    buildRaw(georaster) {
      return `
        ${sb("Format",      "GeoTIFF (classes 0–3)")}
        ${sb("Size",        `${georaster.width} × ${georaster.height} px`)}
        ${sb("Min Class",   (georaster.mins?.[0] ?? "—").toString())}
        ${sb("Max Class",   (georaster.maxs?.[0] ?? "—").toString())}
        ${sb("Projection",  `EPSG:${georaster.projection ?? "—"}`)}
        ${sb("No-Data",     georaster.noDataValue ?? "None")}
      `;
    },
    recommendations(score) {
      if (score >= 75) return ["Thermal conditions are relatively comfortable.", "Monitor during summer peak periods.", "Preserve existing green and water surfaces."];
      if (score >= 40) return ["Moderate heat stress detected.", "Increase urban tree canopy and green roofs.", "Assess dark-surface coverage and replace with lighter materials."];
      return ["Severe urban heat island effect detected.", "Urgent intervention: trees, water features, reflective surfaces.", "Consider restricting dark paving expansion in hotspot zones."];
    }
  },

  "air-quality": {
    title:"Air Quality Analysis", dataFormat:"GeoTIFF", isRaster:true,
    gridField:"geotiff",
    legend:[
      { color:"#00e400", label:"Good",            range:"Class 0" },
      { color:"#ffff00", label:"Moderate",        range:"Class 1" },
      { color:"#ff7e00", label:"Sensitive Groups", range:"Class 2" },
      { color:"#ff0000", label:"Unhealthy",       range:"Class 3" },
      { color:"#8f3f97", label:"Very Unhealthy",  range:"Class 4" },
      { color:"#7e0023", label:"Hazardous",       range:"Class 5" }
    ],
    colorFn(v) {
      const c = Math.round(v);
      if (isNaN(c) || c === -9999) return null;
      if (c === 0) return "rgba(0,228,0,0.8)";
      if (c === 1) return "rgba(255,255,0,0.8)";
      if (c === 2) return "rgba(255,126,0,0.8)";
      if (c === 3) return "rgba(255,0,0,0.8)";
      if (c === 4) return "rgba(143,63,151,0.8)";
      if (c === 5) return "rgba(126,0,35,0.8)";
      return null;
    },
    buildFullArea(georaster) {
      const min  = georaster.mins?.[0] ?? 0;
      const max  = georaster.maxs?.[0] ?? 5;
      const mean = (min + max) / 2;
      const aqiScore = Math.max(0, Math.min(100, Math.round((1 - mean / 5) * 100)));
      const insight = mean >= 3 ? `Severe air quality across the area — avg class ${mean.toFixed(1)}. Immediate action needed.`
        : mean >= 2 ? `Elevated pollution levels affect sensitive groups.`
        : mean >= 1 ? `Air quality is acceptable with moderate pollution signals.`
        : `Air quality is mostly good across the area.`;
      return { html: `
        <div class="stats-grid">
          ${sb("Overall Score", `<span style="color:${scoreColor(aqiScore)}">${aqiScore} / 100</span>`)}
          ${sb("Mean AQI Class", mean.toFixed(2) + " (0=Good · 5=Hazardous)")}
          ${sb("Min Class",      (georaster.mins?.[0] ?? "—").toString())}
          ${sb("Max Class",      (georaster.maxs?.[0] ?? "—").toString())}
          ${sb("Image Size",     `${georaster.width} × ${georaster.height} px`)}
        </div>
        <div class="key-insight">💡 ${insight}</div>
      `, score: aqiScore };
    },
    buildRaw(georaster) {
      return `
        ${sb("Format",     "GeoTIFF (AQI classes 0–5)")}
        ${sb("Size",       `${georaster.width} × ${georaster.height} px`)}
        ${sb("Min Class",  (georaster.mins?.[0] ?? "—").toString())}
        ${sb("Max Class",  (georaster.maxs?.[0] ?? "—").toString())}
        ${sb("Projection", `EPSG:${georaster.projection ?? "—"}`)}
        ${sb("No-Data",    georaster.noDataValue ?? "None")}
      `;
    },
    recommendations(score) {
      if (score >= 75) return ["Air quality is largely acceptable.", "Monitor PM2.5 and NO2 levels seasonally.", "Maintain green buffer zones around roads."];
      if (score >= 40) return ["Moderate pollution detected in some zones.", "Increase monitoring near industrial and traffic corridors.", "Promote public transport to reduce vehicle emissions."];
      return ["Poor air quality across significant portions.", "Identify and restrict major emission sources.", "Establish clean-air zones and enforce emission standards."];
    }
  },

  "crime": {
    title:"Crime Density Analysis", dataFormat:"GeoJSON", isRaster:false,
    gridField:"geojson",
    legend:[
      { color:"#2ecc71", label:"Safe",      range:"0 – 5 /km²" },
      { color:"#f1c40f", label:"Low Risk",  range:"5 – 10 /km²" },
      { color:"#e67e22", label:"Moderate",  range:"10 – 15 /km²" },
      { color:"#e74c3c", label:"High Risk", range:"15 – 20 /km²" },
      { color:"#891508", label:"Hotspot",   range:"> 20 /km²" }
    ],
    styleFeature(f) {
      const d = f.properties.crime_density || 0;
      let color = "#2ecc71";
      if (d > 5)  color = "#f1c40f";
      if (d > 10) color = "#e67e22";
      if (d > 15) color = "#e74c3c";
      if (d > 20) color = "#891508";
      return { fillColor:color, fillOpacity:0.65, color:"#333", weight:1 };
    },
    popupFn(f) {
      const p = f.properties;
      return `<strong>${p.NBHD_NAME||p.name||"Area"}</strong><br>
              Crime Count: ${p.crime_count||0}<br>
              Density: ${(p.crime_density||0).toFixed(2)} /km²`;
    },
    buildFullArea(features) {
      const densities = features.map(f => f.properties.crime_density||0).filter(v => v > 0);
      const avg = densities.length ? (densities.reduce((a,b)=>a+b,0)/densities.length) : 0;
      const max = densities.length ? Math.max(...densities) : 0;
      const hotspots = features.filter(f => (f.properties.crime_density||0) > 20).length;
      const safetyScore = max > 0 ? Math.max(0, Math.round(100 - Math.min(100, (avg/max)*100))) : 50;
      const sorted = [...features]
        .filter(f => f.properties.crime_density != null)
        .sort((a,b) => (b.properties.crime_density||0) - (a.properties.crime_density||0));
      const nameKey = ["NBHD_NAME","name","NAME","district"].find(k => features[0]?.properties?.[k]);
      const getName = f => nameKey ? f.properties[nameKey] : "Area";
      const top3unsafe = sorted.slice(0,3).map(f => `<div style="display:flex;justify-content:space-between;font-size:12px;"><span>${getName(f)}</span><span style="color:#e74c3c;font-weight:600;">${(f.properties.crime_density||0).toFixed(2)}/km²</span></div>`).join("");
      const top3safe   = sorted.slice(-3).reverse().map(f => `<div style="display:flex;justify-content:space-between;font-size:12px;"><span>${getName(f)}</span><span style="color:#2ecc71;font-weight:600;">${(f.properties.crime_density||0).toFixed(2)}/km²</span></div>`).join("");
      const insight = max > 0 && max/Math.max(avg,0.01) > 5
        ? `Crime is heavily concentrated in a few hotspot zones — the rest is relatively safe.`
        : `Crime incidents are spread across the area with no single dominant hotspot.`;
      return { html: `
        <div class="stats-grid">
          ${sb("Overall Score",      `<span style="color:${scoreColor(safetyScore)}">${safetyScore} / 100</span>`)}
          ${sb("Avg Crime Density",  avg.toFixed(2) + " /km²")}
          ${sb("Max Crime Density",  max.toFixed(2) + " /km²")}
          ${sb("Hotspot Areas",      hotspots.toString())}
          ${sb("Areas Analyzed",     features.length.toString())}
        </div>
        ${sorted.length ? `
          <div class="section-label">Area Breakdown</div>
          <div class="stat-box" style="margin-bottom:8px;"><div class="stat-label" style="color:#e74c3c;">Top Unsafe Areas</div><div style="margin-top:6px;font-size:13px;">${top3unsafe}</div></div>
          <div class="stat-box"><div class="stat-label" style="color:#2ecc71;">Top Safe Areas</div><div style="margin-top:6px;font-size:13px;">${top3safe}</div></div>
        ` : ""}
        <div class="key-insight">💡 ${insight}</div>
      `, score: safetyScore };
    },
    buildRaw(features) {
      const total = features.reduce((s,f) => s + (f.properties.crime_count||0), 0);
      return `
        ${sb("Total Features",  features.length.toString())}
        ${sb("Total Incidents", total.toLocaleString())}
        ${sb("Format",          "GeoJSON")}
        ${sb("Geometry",        features[0]?.geometry?.type || "—")}
      `;
    },
    recommendations(score) {
      if (score >= 75) return ["Crime density is relatively low.", "Maintain current policing and surveillance strategies.", "Continue community engagement programs."];
      if (score >= 40) return ["Moderate crime density detected in several zones.", "Increase patrol frequency in medium-risk areas.", "Install additional street lighting in risk zones."];
      return ["High crime density detected. Immediate action needed.", "Deploy targeted policing in identified hotspots.", "Coordinate with local authorities for community safety programs."];
    }
  },

  "public-transport": {
    title:"Public Transport Coverage", dataFormat:"GeoJSON", isRaster:false,
    gridField:"geojson",
    legend:[
      { color:"#4cc2ff", label:"Within walking distance", range:"Covered zones" },
      { color:"#e74c3c", label:"Outside walking distance", range:"Uncovered zones" }
    ],
    // Coverage zones only — boundary and station features are handled separately as inputLayer
    filterFeature(f) { const l=f.properties.layer; return l!=="boundary"&&l!=="station"; },
    styleFeature(f) {
      const isCovered = f.properties.type==="covered";
      return { fillColor:isCovered?"#4cc2ff":"#e74c3c", fillOpacity:isCovered?0.45:0.25,
               color:isCovered?"#1a8fc1":"#c0392b", weight:1.5, dashArray:isCovered?null:"5,4" };
    },
    popupFn(f) {
      const label = f.properties.type==="covered" ? "Within walking distance" : "Outside walking distance";
      return `<strong>${label}</strong>`;
    },
    // inputLayer: boundary (orange dashed) + stations (blue circles)
    buildInputLayer(geojson) {
      const boundaryFeats = { type:"FeatureCollection", features: geojson.features.filter(f=>f.properties.layer==="boundary") };
      const stationFeats  = { type:"FeatureCollection", features: geojson.features.filter(f=>f.properties.layer==="station") };
      const layers = [];
      if (boundaryFeats.features.length) {
        layers.push(L.geoJSON(boundaryFeats, {
          style:() => ({ color:"#f0a500", weight:2, fillOpacity:0, dashArray:"6,3" }),
          onEachFeature:(f,l) => l.bindPopup(`<strong>Area boundary</strong>`)
        }));
      }
      if (stationFeats.features.length) {
        layers.push(L.geoJSON(stationFeats, {
          pointToLayer:(f,ll) => L.circleMarker(ll, { radius:6, fillColor:"#1a8fc1", color:"#0d5f8a", weight:1.5, fillOpacity:1 }),
          onEachFeature:(f,l) => l.bindPopup(`<strong>${f.properties.name||"Transit Station"}</strong>`)
        }));
      }
      return layers.length ? L.layerGroup(layers) : null;
    },
    buildFullArea(features) {
      const covFeats = features.filter(f=>f.properties.type==="covered");
      const uncFeats = features.filter(f=>f.properties.type==="uncovered");
      const stations = features.filter(f=>f.properties.layer==="station").length;
      // coverage_pct is on the overall result — derive from covered/total area ratio
      const covPct = features.filter(f=>f.properties.coverage_pct!=null);
      const avg = covPct.length ? covPct.reduce((s,f)=>s+(f.properties.coverage_pct||0),0)/covPct.length : 0;
      const usedScore = Math.min(100, Math.round(avg));
      const insight = avg >= 70 ? `Good transit coverage — most of the area is within walking distance of a station.`
        : avg >= 40 ? `Moderate coverage — ${(100-avg).toFixed(1)}% of the area lacks walkable transit access.`
        : `Low coverage — ${(100-avg).toFixed(1)}% of the area is underserved by transit.`;
      return { html: `
        <div class="stats-grid">
          ${sb("Overall Score",   `<span style="color:${scoreColor(usedScore)}">${usedScore} / 100</span>`)}
          ${sb("Avg Coverage",    avg.toFixed(1)+"%")}
          ${sb("Transit Stations", stations.toString())}
          ${sb("Covered Zones",   covFeats.length.toString())}
          ${sb("Uncovered Zones", uncFeats.length.toString())}
        </div>
        <div class="key-insight">💡 ${insight}</div>
      `, score: usedScore };
    },
    buildRaw(features) {
      const stations = features.filter(f=>f.properties.layer==="station").length;
      return `
        ${sb("Total Features", features.length.toString())}
        ${sb("Station Points", stations.toString())}
        ${sb("Format",         "GeoJSON")}
        ${sb("Geometry Types", [...new Set(features.map(f=>f.geometry?.type))].join(", "))}
      `;
    },
    recommendations(score) {
      if (score >= 75) return ["Strong transit coverage.", "Focus on frequency and reliability improvements.", "Extend coverage to peri-urban fringes."];
      if (score >= 40) return ["Moderate coverage with notable gaps.", "Prioritise new stops in low-coverage zones.", "Improve pedestrian access to existing stations."];
      return ["Poor transit coverage. Major investment needed.", "Plan new transit corridors for underserved areas.", "Introduce feeder services to connect gaps."];
    }
  },

  "traffic": {
    title:"Traffic Analysis", dataFormat:"GeoJSON", isRaster:false,
    gridField:"geojson",
    legend:[
      { color:"#e74c3c", label:"Primary Roads",   range:"High capacity" },
      { color:"#f39c12", label:"Secondary Roads", range:"Medium capacity" },
      { color:"#3498db", label:"Local Roads",     range:"Low capacity" }
    ],
    // Only render traffic-network features (not hotspot outlines)
    filterFeature(f) { return f.properties.service==="traffic-network" || !f.properties.service; },
    styleFeature(f) {
      const h = f.properties.hierarchy||"local";
      return { color: h==="primary"?"#e74c3c":h==="secondary"?"#f39c12":"#3498db",
               weight: h==="primary"?3.5:h==="secondary"?2:1,
               opacity: h==="primary"?0.95:h==="secondary"?0.80:0.55 };
    },
    popupFn(f) {
      const p = f.properties;
      return `<strong>${(p.hierarchy||"local").charAt(0).toUpperCase()+(p.hierarchy||"local").slice(1)} road</strong><br>
              Length: ${p.length_m!=null?(p.length_m/1000).toFixed(2)+" km":"—"}<br>
              Intersections: ${p.max_degree||"—"} connections`;
    },
    buildFullArea(features) {
      const net = features.filter(f=>f.properties.service==="traffic-network"||!f.properties.service);
      const primary   = net.filter(f=>f.properties.hierarchy==="primary").length;
      const secondary = net.filter(f=>f.properties.hierarchy==="secondary").length;
      const local     = net.filter(f=>f.properties.hierarchy==="local").length;

  "vegetation": {
    title:"Vegetation Density", dataFormat:"GeoJSON", isRaster:false,
    gridField:"geojson",
    legend:[
      { color:"rgba(30,160,50,0.85)",   label:"Dense Vegetation",    range:"≥ 50%" },
      { color:"rgba(80,180,0,0.85)",    label:"Good Coverage",       range:"30 – 50%" },
      { color:"rgba(230,200,0,0.85)",   label:"Moderate",            range:"15 – 30%" },
      { color:"rgba(200,40,0,0.85)",    label:"Sparse / Bare",       range:"< 15%" }
    ],
    buildLayer(geojson) {
      // Render vegetation as smooth overlapping blobs (continuous raster feel)
      // instead of discrete grid cells. Each cell becomes two concentric circles:
      // a wide low-opacity glow and a tighter opaque core. The overlap between
      // neighbouring circles merges them into a fluid, non-grid surface.
      const features = geojson.features || [];
      if (!features.length) return L.layerGroup();

      // Estimate cell half-width in degrees from the first feature's bbox
      const coords = features[0].geometry?.coordinates?.[0];
      const cellHalfDeg = coords
        ? Math.abs(coords[2][0] - coords[0][0]) / 2
        : 0.002;
      const cellRadiusM = cellHalfDeg * 111320; // approx metres

      const canvas = L.canvas({ padding: 0.6 });

      // Invisible polygon layer used only for getBounds()
      const bboxLayer = L.geoJSON(geojson, {
        style: () => ({ fillOpacity: 0, opacity: 0, weight: 0 }),
        interactive: false,
      });

      // All circles share one canvas renderer for performance
      const circleLayer = L.layerGroup();
      features.forEach(f => {
        const pct = f.properties.vegetation_pct ?? 0;
        const cx  = f.properties.cell_cx;
        const cy  = f.properties.cell_cy;
        if (cx == null || cy == null) return;

        const color   = vegPctColor(pct);
        // Vegetated cells are fully visible; sparse areas fade towards transparent
        const coreOpacity = 0.15 + (pct / 100) * 0.65;
        const glowOpacity = coreOpacity * 0.38;

        // Outer glow — bleeds into neighbouring cells to smooth boundaries
        if (pct >= 2) {
          circleLayer.addLayer(L.circle([cy, cx], {
            renderer: canvas,
            radius: cellRadiusM * 1.35,
            fillColor: color,
            fillOpacity: glowOpacity,
            color: "transparent",
            weight: 0,
            interactive: false,
          }));
        }

        // Inner core — clickable popup
        const p       = f.properties;
        const pctStr  = p.vegetation_pct != null ? p.vegetation_pct.toFixed(1) + "%" : "—";
        const tag     = p.passes_30pct ? "✓ Passes 30% standard" : "✗ Below 30% standard";
        const core = L.circle([cy, cx], {
          renderer: canvas,
          radius: cellRadiusM * 0.78,
          fillColor: color,
          fillOpacity: coreOpacity,
          color: "transparent",
          weight: 0,
        });
        core.bindPopup(`<strong>Vegetation:</strong> ${pctStr}<br>
                        <strong>QoL Score:</strong> ${p.qol_score ?? "—"}/100<br>
                        <span style="font-size:11px;">${tag}</span>`);
        circleLayer.addLayer(core);
      });

      const group = L.layerGroup([bboxLayer, circleLayer]);
      group.getBounds = () => { try { return bboxLayer.getBounds(); } catch(e) { return null; } };
      return group;
    },
    styleFeature(f) {
      return { fillColor:vegPctColor(f.properties.vegetation_pct??0), fillOpacity:0.65,
               color:"rgba(0,0,0,0.2)", weight:0.8 };
    },
    popupFn(f) {
      const p=f.properties;
      const pct = p.vegetation_pct!=null?p.vegetation_pct.toFixed(1)+"%":"—";
      const tag = p.passes_30pct?"✓ Passes 30% standard":"✗ Below 30% standard";
      return `<strong>Vegetation:</strong> ${pct}<br>
              <strong>QoL Score:</strong> ${p.qol_score??"—"}/100<br>
              <span style="font-size:11px;">${tag}</span>`;
    },
    buildFullArea(features) {
      const vegPcts = features.map(f=>f.properties.vegetation_pct??0);
      const avg = vegPcts.length ? vegPcts.reduce((a,b)=>a+b,0)/vegPcts.length : 0;
      const pass = features.filter(f=>f.properties.passes_30pct).length;
      const score = Math.min(100, Math.round((avg/30)*100));
      const gap = avg-30;
      const gapHtml = gap>=0
        ? `<span style="color:#2ecc71">▲ ${gap.toFixed(1)}% above 30% standard</span>`
        : `<span style="color:#e74c3c">▼ ${Math.abs(gap).toFixed(1)}% below 30% standard</span>`;
      const insight = avg>=30 ? `Coverage meets the urban greenery standard.`
        : `Coverage is ${avg.toFixed(1)}% — ${Math.abs(gap).toFixed(1)}% below the 30% benchmark.`;
      return { html: `
        <div class="stats-grid">
          ${sb("Overall Score",    `<span style="color:${scoreColor(score)}">${score} / 100</span>`)}
          ${sb("Avg Coverage",     avg.toFixed(1)+"%")}
          ${sb("vs. 30% Standard", gapHtml)}
          ${sb("Zones Passing",    `${pass} / ${features.length}`)}
        </div>
        <div class="key-insight">💡 ${insight}</div>
      `, score };
    },
    buildRaw(features) {
      return `${sb("Total Zones",features.length.toString())}${sb("Format","GeoJSON")}${sb("Geometry",features[0]?.geometry?.type||"—")}`;
    },
    recommendations(score) {
      if (score >= 75) return ["Vegetation coverage meets the urban greenery standard.", "Monitor for seasonal changes.", "Focus on connectivity between green spaces."];
      if (score >= 40) return ["Moderate vegetation — some areas below the 30% benchmark.", "Prioritize planting in low-coverage cells.", "Explore rooftop and vertical greening solutions."];
      return ["Critical vegetation deficit detected.", "Initiate urgent urban greening programs.", "Partner with municipality on tree-planting and park creation targets."];
    }
  },

  "facility-accessibility": {
    title:"Facility Accessibility", dataFormat:"GeoJSON", isRaster:false,
    gridField:"geojson",
    legend:[
      { color:FACILITY_ZONE_COLORS[0], label:"≤ 5 min walk",  range:"Best access" },
      { color:FACILITY_ZONE_COLORS[1], label:"≤ 10 min walk", range:"Good access" },
      { color:FACILITY_ZONE_COLORS[2], label:"≤ 15 min walk", range:"Moderate" },
      { color:"#e74c3c",               label:"Uncovered",      range:"Outside range" }
    ],
    // Zone polygons only — boundary and facility points handled in inputLayer
    filterFeature(f) { return f.properties.layer!=="boundary"; },
    styleFeature(f) {
      const p=f.properties;
      if (p.type==="uncovered"||p.category==="uncovered") {
        return { color:"#e74c3c", fillColor:"#e74c3c", fillOpacity:0.18, weight:1, dashArray:"4,3" };
      }
      // Sort all time values ascending; color by index
      const t=p.time_min;
      const color=FACILITY_ZONE_COLORS[0]; // will be overridden per-feature via onEachFeature
      return { color, fillColor:color, fillOpacity:0.4, weight:1.5 };
    },
    // Override per-feature since styleFeature can't access all features for sorting
    buildLayer(geojson) {
      const allTimes=[...new Set(geojson.features.map(f=>f.properties.time_min).filter(x=>x!=null))].sort((a,b)=>a-b);
      const zoneFeats=geojson.features.filter(f=>f.properties.layer!=="boundary");
      // Sort: boundary first (already excluded), uncovered, then zones largest-time first (so smallest renders on top)
      const sorted=[...zoneFeats].sort((a,b)=>{
        const ra=(a.properties.type==="uncovered"||a.properties.category==="uncovered")?0:1+allTimes.indexOf(b.properties.time_min??999);
        const rb=(b.properties.type==="uncovered"||b.properties.category==="uncovered")?0:1+allTimes.indexOf(a.properties.time_min??999);
        return ra-rb;
      });
      return L.geoJSON({type:"FeatureCollection",features:sorted},{
        style(f){
          const p=f.properties;
          if(p.type==="uncovered"||p.category==="uncovered")
            return {color:"#e74c3c",fillColor:"#e74c3c",fillOpacity:0.18,weight:1,dashArray:"4,3"};
          const idx=allTimes.indexOf(p.time_min);
          const color=FACILITY_ZONE_COLORS[idx]??"#888";
          const opacity=Math.max(0.20,0.45-idx*0.05);
          return {color,fillColor:color,fillOpacity:opacity,weight:1.5};
        },
        onEachFeature(f,l){
          const p=f.properties;
          if(p.type==="uncovered"||p.category==="uncovered"){
            l.bindPopup("<strong style='color:#e74c3c'>Outside walking range</strong><br>No facility reachable within the maximum walk time.");
            return;
          }
          const idx=allTimes.indexOf(p.time_min);
          const color=FACILITY_ZONE_COLORS[idx]??"#888";
          l.bindPopup(`<strong style="color:${color}">Within ${p.time_min} min walk</strong><br>Radius: ${p.radius_m} m<br>Facilities: ${p.facility_count}`);
        }
      });
    },
    buildInputLayer(geojson) {
      const boundaryFeats={type:"FeatureCollection",features:geojson.features.filter(f=>f.properties.layer==="boundary")};
      const facilityFeats={type:"FeatureCollection",features:geojson.features.filter(f=>f.properties.type==="facility")};
      const layers=[];
      if(boundaryFeats.features.length) layers.push(L.geoJSON(boundaryFeats,{
        style:()=>({color:"#f0a500",weight:2,fillOpacity:0,dashArray:"6,3"}),
        onEachFeature:(f,l)=>l.bindPopup("<strong>Area of interest boundary</strong>")
      }));
      if(facilityFeats.features.length) layers.push(L.geoJSON(facilityFeats,{
        pointToLayer:(f,ll)=>L.circleMarker(ll,{radius:5,fillColor:"#4cc2ff",color:"#1a8fc1",weight:1.5,opacity:1,fillOpacity:0.9}),
        onEachFeature:(f,l)=>l.bindPopup(`<strong>Facility</strong><br>${f.properties.name||"—"}`)
      }));
      return layers.length?L.layerGroup(layers):null;

    buildFullArea(features) {
      const allTimes=[...new Set(features.map(f=>f.properties.time_min).filter(x=>x!=null))].sort((a,b)=>a-b);
      // facility points are not stored in the result GeoJSON — read from facility_count on zone features
      const zoneWithCount=features.find(f=>f.properties.facility_count!=null);
      const facilities=zoneWithCount?zoneWithCount.properties.facility_count:0;
      const lastT=allTimes[allTimes.length-1];
      // Find the outermost zone coverage pct
      const lastZone=features.find(f=>f.properties.time_min===lastT&&f.properties.coverage_pct!=null);
      const covPct=lastZone?.properties?.coverage_pct??null;
      const uncovPct=covPct!=null?(100-covPct).toFixed(1):null;
      const zoneCards=allTimes.map((t,i)=>{
        const feat=features.find(f=>f.properties.time_min===t&&f.properties.coverage_pct!=null);
        const pct=feat?.properties?.coverage_pct;
        if(pct==null) return "";
        return sb(`% area within ${t}-min walk`,`<span style="color:${FACILITY_ZONE_COLORS[i]??'#888'}">${pct.toFixed(1)}%</span>`);
      }).join("");
      const insight = covPct!=null
        ? covPct>70 ? `${covPct.toFixed(1)}% of the area is accessible — good facility distribution.`
        : covPct>40 ? `Moderate accessibility — ${uncovPct}% of the area is outside walking range.`
        : `Facility coverage is limited — only ${covPct.toFixed(1)}% of the area is within walking range.`
        : `Facility accessibility analysis completed. Review zone map for spatial coverage.`;
      return { html: `
        <div class="stats-grid">
          ${covPct!=null?sb("Total Coverage",`<span style="color:${scoreColor(Math.round(covPct))}">${covPct.toFixed(1)}%</span>`):""}
          ${sb("Facilities Found", facilities.toString())}
          ${zoneCards}
          ${covPct!=null?sb("Uncovered",`<span style="color:#e74c3c">${uncovPct}%</span>`):""}
        </div>
        <div class="key-insight">💡 ${insight}</div>
      `, score:covPct!=null?Math.min(100,Math.round(covPct)):null, useDbScore:true };
    },
    buildRaw(features) {
      const zoneWithCount=features.find(f=>f.properties.facility_count!=null);
      const facilities=zoneWithCount?zoneWithCount.properties.facility_count:0;
      const allTimes=[...new Set(features.map(f=>f.properties.time_min).filter(x=>x!=null))].sort((a,b)=>a-b);
      return `${sb("Total Features",features.length.toString())}${sb("Facility Points",facilities.toString())}${sb("Time Intervals",allTimes.join(", ")+" min")}${sb("Format","GeoJSON")}`;
    },
    recommendations(score) {
      if (score >= 75) return ["Good facility distribution across the area.", "Monitor access equity across income groups.", "Maintain and expand facility coverage."];
      if (score >= 40) return ["Moderate accessibility gaps exist.", "Prioritize new facilities in low-access zones.", "Improve pedestrian connectivity to existing facilities."];
      return ["Critical accessibility gaps detected.", "Urgent: plan new facilities in underserved zones.", "Coordinate with local authorities on service delivery."];
    }
  },

// ── Helpers ───────────────────────────────────────────────────────────────────
// sb = stat box (2-col grid cell)
function sb(label, value) {
  return `<div class="stat-box"><div class="stat-label">${label}</div><div class="stat-value">${value}</div></div>`;
}
// ic = inline card (full-width, used for list items inside stats-grid)
function ic(label, value) {
  return `<div class="stat-box" style="grid-column:span 2;"><div class="stat-label">${label}</div><div class="stat-value" style="font-size:14px;">${value}</div></div>`;
}
function scoreColor(s) {
  if (s == null) return "var(--accent)";
  if (s >= 75) return "#2ecc71";
  if (s >= 40) return "#f0a500";
  return "#e74c3c";
}
function scoreClass(s) {
  if (s === "high") return "score-high";
  if (s === "mid")  return "score-mid";
  return "score-low";
}
function sanitizeResultFile(path) {
  if (!path || !path.trim()) return null;
  path = path.trim();
  if (/^[A-Za-z]:[\\\/]/.test(path)) return null;
  if (path.startsWith("/") && !path.startsWith("/outputs")) return null;
  path = path.replace(/^outputs\/outputs\//, "outputs/");
  if (!path.includes("/")) return null;
  if (!path.startsWith("outputs/")) return null;
  return path;
}

// ── Map init ──────────────────────────────────────────────────────────────────
let _currentBasemap = null;

function initMap() {
  _map = L.map("analysisMap").setView([30.0444, 31.2357], 10);
  _currentBasemap = L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    { attribution:"Tiles © Esri" }
  ).addTo(_map);
  _initHud();
  return _map;
}

// ── HUD: scale bar + coordinates ─────────────────────────────────────────────
function _initHud() {
  const coordsEl = document.getElementById('mapCoords');
  const lineEl   = document.getElementById('mapScaleLine');
  const labelEl  = document.getElementById('mapScaleLabel');
  const NICE = [1,2,5,10,20,50,100,200,500,1000,2000,5000,10000,20000,50000,100000,200000,500000,1000000];
  function updateScale() {
    const c = _map.getCenter(), z = _map.getZoom();
    const mpp = (156543.03392 * Math.cos(c.lat * Math.PI / 180)) / Math.pow(2, z);
    const target = mpp * 80;
    let best = NICE[0];
    for (const d of NICE) { if (Math.abs(d - target) < Math.abs(best - target)) best = d; }
    lineEl.style.width = (best / mpp) + 'px';
    labelEl.textContent = best >= 1000 ? (best / 1000) + ' km' : best + ' m';
  }
  _map.on('mousemove', e => { coordsEl.textContent = e.latlng.lat.toFixed(5) + ', ' + e.latlng.lng.toFixed(5); });
  _map.on('mouseout',  () => { coordsEl.textContent = '— , —'; });
  _map.on('zoomend moveend', updateScale);
  updateScale();
}

// ── Measure tool ─────────────────────────────────────────────────────────────
const _ms = { active:false, sessionPoints:[], totalDistance:0, markers:[], lines:[], labels:[], previewLine:null };
let _measureOverlay = null, _measureIgnoreNextClick = false;

function _hav(a, b) {
  const R=6371000, φ1=a.lat*Math.PI/180, φ2=b.lat*Math.PI/180;
  const Δφ=(b.lat-a.lat)*Math.PI/180, Δλ=(b.lng-a.lng)*Math.PI/180;
  const s=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}
function _fmtD(m) { return m>=1000?(m/1000).toFixed(2)+' km':Math.round(m)+' m'; }

function _measureGetOverlay() {
  if (_measureOverlay) return _measureOverlay;
  _measureOverlay = document.createElement('div');
  // z-index below the controls (600) so buttons remain clickable
  _measureOverlay.style.cssText = 'position:absolute;inset:0;z-index:550;cursor:crosshair;display:none;';
  _map.getContainer().appendChild(_measureOverlay);
  return _measureOverlay;
}
function _measureClick(e) {
  if (_measureIgnoreNextClick) { _measureIgnoreNextClick = false; return; }
  // Ignore clicks that land on the controls toolbar
  if (e.target.closest && e.target.closest('.map-controls')) return;
  const rect = _map.getContainer().getBoundingClientRect();
  const ll = _map.containerPointToLatLng(L.point(e.clientX - rect.left, e.clientY - rect.top));
  const mk = L.circleMarker(ll,{radius:5,color:'#4cc2ff',fillColor:'#fff',fillOpacity:1,weight:2,interactive:false}).addTo(_map);
  _ms.markers.push(mk);
  if (_ms.sessionPoints.length) {
    const prev = _ms.sessionPoints[_ms.sessionPoints.length-1];
    const line = L.polyline([prev,ll],{color:'#4cc2ff',weight:2,dashArray:'6 5',opacity:0.7,interactive:false}).addTo(_map);
    const dist = _hav(prev, ll);
    const mid  = L.latLng((prev.lat+ll.lat)/2,(prev.lng+ll.lng)/2);
    const lbl  = L.marker(mid,{icon:L.divIcon({className:'',html:`<div class="measure-label">${_fmtD(dist)}</div>`,iconAnchor:[0,0]}),interactive:false,zIndexOffset:500}).addTo(_map);
    _ms.lines.push(line); _ms.labels.push(lbl);
    _ms.totalDistance += dist;
  }
  _ms.sessionPoints.push(ll);
  _measureUpdateTotal();
}
function _measureDblClick() { _measureIgnoreNextClick = true; measureDeactivate(); }
function _measureMove(e) {
  if (!_ms.sessionPoints.length) return;
  const rect = _map.getContainer().getBoundingClientRect();
  const ll = _map.containerPointToLatLng(L.point(e.clientX-rect.left, e.clientY-rect.top));
  const last = _ms.sessionPoints[_ms.sessionPoints.length-1];
  if (_ms.previewLine) _ms.previewLine.setLatLngs([last,ll]);
  else _ms.previewLine = L.polyline([last,ll],{color:'#4cc2ff',weight:1.5,dashArray:'4 6',opacity:0.45,interactive:false}).addTo(_map);
}
function _measureUpdateTotal() {
  const el = document.getElementById('measureTotal');
  if (!_ms.totalDistance && _ms.sessionPoints.length < 2) { el.style.display='none'; return; }
  el.innerHTML = 'Total: ' + _fmtD(_ms.totalDistance);
  el.style.display = 'flex';
}
function measureClearAll() {
  _ms.markers.forEach(m=>_map.removeLayer(m)); _ms.lines.forEach(l=>_map.removeLayer(l)); _ms.labels.forEach(l=>_map.removeLayer(l));
  if (_ms.previewLine) _map.removeLayer(_ms.previewLine);
  Object.assign(_ms,{sessionPoints:[],totalDistance:0,markers:[],lines:[],labels:[],previewLine:null});
  const el=document.getElementById('measureTotal'); el.style.display='none'; el.innerHTML='';
}
function measureDeactivate() {
  _ms.active=false; _ms.sessionPoints=[];
  const btn=document.getElementById('measureBtn');
  btn.innerHTML='<img width="20" height="20" src="https://img.icons8.com/material/24/FFFFFF/ruler--v1.png" alt="ruler--v1"/>Measure';
  btn.classList.remove('mc-btn-active');
  const ov=_measureGetOverlay(); ov.style.display='none';
  ov.removeEventListener('click',_measureClick); ov.removeEventListener('dblclick',_measureDblClick); ov.removeEventListener('mousemove',_measureMove);
  if (_ms.previewLine) { _map.removeLayer(_ms.previewLine); _ms.previewLine=null; }
  if (_ms.totalDistance>0) {
    const el=document.getElementById('measureTotal');
    el.innerHTML=`Total: ${_fmtD(_ms.totalDistance)} <button class="measure-clear-btn" onclick="measureClearAll()">Clear</button>`;
    el.style.display='flex';
  }
}
function toggleMeasure() {
  if (_ms.active) { measureDeactivate(); return; }
  _ms.sessionPoints=[]; _ms.active=true;
  const btn=document.getElementById('measureBtn');
  btn.innerHTML='<img width="20" height="20" src="https://img.icons8.com/material/24/FFFFFF/ruler--v1.png" alt="ruler--v1"/>Cancel';
  btn.classList.add('mc-btn-active');
  const ov=_measureGetOverlay(); ov.style.display='block';
  ov.addEventListener('click',_measureClick); ov.addEventListener('dblclick',_measureDblClick); ov.addEventListener('mousemove',_measureMove);
}

// ── Annotate tool ────────────────────────────────────────────────────────────
const _as = { active:false, drawing:false, color:'#e74c3c', eraser:false, brushSize:4, eraserSize:18 };
let _aCanvas=null, _aCtx=null, _aOverlay=null;

function _annotateCanvas() {
  if (_aCanvas) return _aCanvas;
  const c = _map.getContainer();
  _aCanvas = document.createElement('canvas');
  _aCanvas.style.cssText='position:absolute;inset:0;z-index:540;pointer-events:none;';
  _aCanvas.width=c.offsetWidth; _aCanvas.height=c.offsetHeight;
  c.appendChild(_aCanvas); _aCtx=_aCanvas.getContext('2d');
  new ResizeObserver(()=>{ const d=_aCtx.getImageData(0,0,_aCanvas.width,_aCanvas.height); _aCanvas.width=c.offsetWidth; _aCanvas.height=c.offsetHeight; _aCtx.putImageData(d,0,0); }).observe(c);
  return _aCanvas;
}
function _annotateOverlay() {
  if (_aOverlay) return _aOverlay;
  _aOverlay=document.createElement('div');
  // z-index below the controls (600) so buttons remain clickable
  _aOverlay.style.cssText='position:absolute;inset:0;z-index:545;cursor:crosshair;display:none;';
  _map.getContainer().appendChild(_aOverlay); return _aOverlay;
}
function _aPos(e) { const r=_map.getContainer().getBoundingClientRect(),s=e.touches?e.touches[0]:e; return{x:s.clientX-r.left,y:s.clientY-r.top}; }
function _aDown(e) {
  _as.drawing=true; const{x,y}=_aPos(e); _aCtx.beginPath(); _aCtx.moveTo(x,y);
  if(_as.eraser){_aCtx.globalCompositeOperation='destination-out';_aCtx.lineWidth=_as.eraserSize;}
  else{_aCtx.globalCompositeOperation='source-over';_aCtx.strokeStyle=_as.color;_aCtx.lineWidth=_as.brushSize;}
  _aCtx.lineCap='round'; _aCtx.lineJoin='round';
}
function _aMove(e) { if(!_as.drawing)return; const{x,y}=_aPos(e); _aCtx.lineTo(x,y); _aCtx.stroke(); }
function _aUp()   { if(!_as.drawing)return; _as.drawing=false; _aCtx.closePath(); }
function annotateClearAll() { if(_aCtx&&_aCanvas) _aCtx.clearRect(0,0,_aCanvas.width,_aCanvas.height); }
function annotateSelectTool(type, color, btnEl) {
  document.querySelectorAll('.annotate-color-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('annotateEraserBtn').classList.remove('selected');
  _as.eraser = type==='eraser'; if(color)_as.color=color;
  btnEl.classList.add('selected');
}
function _annotateDeactivate() {
  _as.active=false; _as.drawing=false;
  document.getElementById('annotateBtn').innerHTML='<img width="20" height="20" src="https://img.icons8.com/windows/32/FFFFFF/sign-up.png" alt="sign-up"/>Annotate';
  document.getElementById('annotateBtn').classList.remove('mc-btn-active');
  document.getElementById('annotateToolbar').classList.remove('visible');
  _map.dragging.enable(); _map.doubleClickZoom.enable();
  const ov=_annotateOverlay(); ov.style.display='none';
  ov.removeEventListener('mousedown',_aDown); ov.removeEventListener('mousemove',_aMove);
  ov.removeEventListener('mouseup',_aUp); ov.removeEventListener('mouseleave',_aUp);
  if(_aCanvas) _aCanvas.style.pointerEvents='none';
}
function toggleAnnotate() {
  if(_as.active){_annotateDeactivate();return;}
  _as.active=true; _annotateCanvas();
  document.getElementById('annotateBtn').innerHTML='<img width="20" height="20" src="https://img.icons8.com/windows/32/FFFFFF/sign-up.png" alt="sign-up"/>Cancel';
  document.getElementById('annotateBtn').classList.add('mc-btn-active');
  document.getElementById('annotateToolbar').classList.add('visible');
  _map.dragging.disable(); _map.doubleClickZoom.disable();
  const ov=_annotateOverlay(); ov.style.display='block';
  ov.addEventListener('mousedown',_aDown); ov.addEventListener('mousemove',_aMove);
  ov.addEventListener('mouseup',_aUp); ov.addEventListener('mouseleave',_aUp);

function exportMap(fmt) {
  fmt=fmt.toLowerCase();
  const btn=document.getElementById('export-btn');
  if(btn){btn.disabled=true;btn.innerHTML='⏳ Exporting…';}
  const reset=()=>{if(btn){btn.disabled=false;btn.innerHTML='<img width="20" height="20" src="https://img.icons8.com/ios-filled/50/FFFFFF/download--v1.png" alt="download--v1"/>Export▾';}};
  setTimeout(()=>{
    try{
      const mc=document.querySelector('.leaflet-container');
      if(!mc){reset();return;}
      const w=mc.offsetWidth,h=mc.offsetHeight;
      const ec=document.createElement('canvas'); ec.width=w; ec.height=h;
      const ctx=ec.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
      ctx.save(); ctx.beginPath(); ctx.rect(0,0,w,h); ctx.clip();
      const cr=mc.getBoundingClientRect();
      // tiles
      const tiles=Array.from(mc.querySelectorAll('.leaflet-tile-pane img.leaflet-tile')).filter(i=>i.complete);
      let pending=tiles.length||1, done=false;
      function finish(){
        if(done)return; done=true;
        // SVG vector layers
        mc.querySelectorAll('.leaflet-overlay-pane svg').forEach(svg=>{
          const s=new XMLSerializer().serializeToString(svg);
          const blob=new Blob([s],{type:'image/svg+xml'}), url=URL.createObjectURL(blob);
          const img=new Image(), off=_elOff(svg,cr);
          img.onload=()=>{try{ctx.drawImage(img,off.x,off.y);}catch(e){}URL.revokeObjectURL(url);};
          img.onerror=()=>URL.revokeObjectURL(url); img.src=url;
        });
        // annotation canvas
        if(_aCanvas&&_aCanvas.width) try{ctx.drawImage(_aCanvas,0,0);}catch(e){}
        ctx.restore();
        setTimeout(()=>{
          reset();
          const mime={png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',tiff:'image/tiff'}[fmt]||'image/png';
          const q=(fmt==='jpg'||fmt==='jpeg')?0.92:undefined;
          const a=document.createElement('a'); a.href=ec.toDataURL(mime,q); a.download='map-export.'+fmt;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        },200);
      }
      if(!tiles.length){finish();return;}
      tiles.forEach(src=>{
        const r=src.getBoundingClientRect(),dx=r.left-cr.left,dy=r.top-cr.top,dw=r.width||256,dh=r.height||256;
        const img=new Image(); img.crossOrigin='anonymous';
        img.onload=()=>{try{ctx.drawImage(img,dx,dy,dw,dh);}catch(e){}if(!--pending)finish();};
        img.onerror=()=>{try{ctx.drawImage(src,dx,dy,dw,dh);}catch(e){}if(!--pending)finish();};
        img.src=src.src;
      });
    }catch(err){console.error(err);reset();}
  },250);
}
function _elOff(el,cr){
  const r=el.getBoundingClientRect(); let x=r.left-cr.left,y=r.top-cr.top;
  const t=window.getComputedStyle(el).transform;
  if(t&&t!=='none'){const m=t.match(/matrix\(([^)]+)\)/);if(m){const p=m[1].split(',');x+=parseFloat(p[4])||0;y+=parseFloat(p[5])||0;}}
  return{x,y};
}

// ── Raster loader ─────────────────────────────────────────────────────────────
async function loadRaster(url, config, isRaw) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const buf = await res.arrayBuffer();

  const georaster = await parseGeoraster(buf);
  if (!georaster.projection || georaster.projection === 32767) georaster.projection = 4326;

  const min = (georaster.mins?.[0] != null && !isNaN(georaster.mins[0])) ? georaster.mins[0] : 0;
  const max = (georaster.maxs?.[0] != null && !isNaN(georaster.maxs[0])) ? georaster.maxs[0] : 1;

  let colorFn;
  if (isRaw) {
    // Grey gradient for raw view
    const range = max - min || 1;
    colorFn = (values) => {
      const v = values[0];
      if (v == null || isNaN(v) || v === -9999) return null;
      const t = Math.max(0, Math.min(1, (v - min) / range));
      const c = Math.round(t * 200 + 30);
      return `rgba(${c},${c},${c+20},0.85)`;
    };
  } else {
    colorFn = (values) => config.colorFn(values[0], min, max);
  }

  const layer = new GeoRasterLayer({
    georaster, opacity:0.85, resolution:256, debugLevel:0,
    pixelValuesToColorFn: colorFn
  });

  return { layer, georaster, buf };
}

// ── Vector loader ─────────────────────────────────────────────────────────────
async function loadVector(url, config) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const geojson  = await res.json();
  const features = geojson.features || [];

  // Some configs provide a custom buildLayer (e.g. facility-accessibility needs
  // per-feature time sorting that styleFeature alone can't do)
  let layer;
  if (config.buildLayer) {
    layer = config.buildLayer(geojson);
  } else {
    const filtered = config.filterFeature
      ? { type:"FeatureCollection", features: features.filter(f => config.filterFeature(f)) }
      : geojson;
    layer = L.geoJSON(filtered, {
      style:        f => config.styleFeature ? config.styleFeature(f) : { fillColor:"#00d4aa", fillOpacity:0.5, color:"#333", weight:1 },
      pointToLayer: config.pointToLayer ? (f,ll) => config.pointToLayer(f,ll) : undefined,
      onEachFeature:(f,l) => { const p = config.popupFn?.(f); if (p) l.bindPopup(p); }
    });
  }

  return { layer, geojson, features };
}

// ── Grid / Cell loader ────────────────────────────────────────────────────────
async function loadGrid() {
  if (_gridLoaded) return;
  const pane = document.getElementById("tab-grid");
  pane.innerHTML = `<div class="loading-state"><div class="spinner"></div>Generating cell grid…</div>`;

  const type = _analysis.type;
  const url  = `${API_BASE_URL}/${_analysis.result_file}`;

  try {
    const fileRes = await fetch(url);
    if (!fileRes.ok) throw new Error(`Could not fetch result file (HTTP ${fileRes.status})`);
    const blob = await fileRes.blob();

    const fieldName = _config.gridField || (_config.isRaster ? "geotiff" : "geojson");
    const form = new FormData();
    form.append(fieldName, blob, _config.isRaster ? "result.tif" : "result.geojson");

    const gridRes = await fetch(`${API_BASE_URL}/calculate-grid/${type}`, { method:"POST", body:form });
    if (!gridRes.ok) throw new Error(`Grid endpoint returned HTTP ${gridRes.status}`);

    const geojson = await gridRes.json();
    _gridLoaded = true;
    window._lastGridGeoJSON = geojson;

    const scores = geojson.features.map(f => f.properties.qol_score).filter(s => s != null && !isNaN(s));
    const avg    = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
    const best   = scores.length ? Math.max(...scores) : null;
    const worst  = scores.length ? Math.min(...scores) : null;
    const csm    = geojson.cell_size_m || "?";
    const clabel = csm >= 1000 ? `${(csm/1000).toFixed(1)} km` : `${csm} m`;

    pane.innerHTML = `
      <div class="tab-panel-header">Grid / Cell Analysis</div>
      <div class="stats-grid">
        ${sb("Total Cells", geojson.features.length.toLocaleString())}
        ${sb("Cell Size",   clabel)}
        ${avg  != null ? sb("Avg Score",  `<span style="color:${scoreColor(avg)}">${avg}/100</span>`)  : ""}
        ${best != null ? sb("Best Cell",  `<span style="color:#27ae60">${best}/100</span>`) : ""}
        ${worst!= null ? sb("Worst Cell", `<span style="color:#e74c3c">${worst}/100</span>`) : ""}
      </div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">Click any cell on the map to see its QoL score.</p>
      <button class="exp-btn" style="width:100%;" onclick="downloadGridGeoJSON()">⬇ Download Grid GeoJSON</button>
    `;

    _gridLayer = L.geoJSON(geojson, {
      style: f => ({ fillColor:gridScoreColor(f.properties.qol_score), fillOpacity:0.7, color:"rgba(0,0,0,0.12)", weight:0.5 }),
      onEachFeature: (f, layer) => layer.bindPopup(`<strong>Cell QoL Score:</strong> ${f.properties.qol_score ?? "—"}/100`)
    });

    if (_currentMapLayer === "grid") {
      [_resultLayer, _rawLayer].forEach(l => { if (l && _map.hasLayer(l)) _map.removeLayer(l); });
      _gridLayer.addTo(_map);
      fitLayer(_gridLayer);
    }

  } catch(err) {
    console.error("Grid load error:", err);
    pane.innerHTML = `<div class="error-box">Could not generate grid: ${err.message}</div>`;
  }
}

function gridScoreColor(s) {
  if (s == null) return "#555";
  if (s >= 75) return "#27ae60";
  if (s >= 50) return "#f0a500";
  if (s >= 25) return "#e67e22";
  return "#e74c3c";
}

function downloadGridGeoJSON() {
  const obj = window._lastGridGeoJSON;
  if (!obj) { alert("Generate the grid first by clicking the Grid / Cell tab."); return; }

  // Inject simplestyle colours matching the grid rendering (same as dashboard)
  const copy = JSON.parse(JSON.stringify(obj));
  const type = _analysis.type;
  copy.features.forEach(f => {
    const p = f.properties;
    let fill;
    if (type === "vegetation") {
      const v = p.value ?? 0;
      fill = v >= 50 ? "#27ae60" : v >= 30 ? "#f39c12" : "#e74c3c";
    } else if (type === "traffic") {
      const c = p.congestion || "low";
      fill = c === "high" ? "#e74c3c" : c === "medium" ? "#f39c12" : "#2ecc71";
    } else if (type === "informal-settlement") {
      const v = p.value ?? 0;
      fill = v >= 0.6 ? "#e74c3c" : v >= 0.3 ? "#f39c12" : "#27ae60";
    } else {
      const s = p.qol_score ?? 0;
      fill = s >= 75 ? "#27ae60" : s >= 50 ? "#f0a500" : s >= 25 ? "#e67e22" : "#e74c3c";
    }
    p["fill"]           = fill;
    p["fill-opacity"]   = 0.7;
    p["stroke"]         = "rgba(0,0,0,0.15)";
    p["stroke-width"]   = 0.5;
    p["stroke-opacity"] = 0.5;
  });

  const blob = new Blob([JSON.stringify(copy, null, 2)], { type:"application/geo+json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${_analysis.type}_grid.geojson`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}
