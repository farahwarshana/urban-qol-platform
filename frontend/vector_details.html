<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vector Analysis Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/theme.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background:var(--bg);
      color:var(--text);
      font-family:'Space Grotesk',sans-serif;
      min-height:100vh;
      padding:40px;
    }

    .container { max-width:1800px; margin:auto; }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
    }

    .back-btn {
      background:var(--surface2);
      border:1px solid var(--border);
      color:var(--text);
      padding:10px 18px;
      border-radius:10px;
      cursor:pointer;
      transition:.2s;
      font-family:inherit;
    }

    .back-btn:hover {
      border-color:var(--accent);
      color:var(--accent);
    }

    .analysis-title {
      font-size:34px;
      font-weight:700;
      margin-bottom:10px;
    }

    .analysis-sub {
      color:var(--muted);
      margin-bottom:30px;
      font-size:15px;
    }

    .card {
      background:rgba(26,29,39,.88);
      border:1px solid var(--border);
      border-radius:20px;
      padding:22px;
      backdrop-filter:blur(14px);
      transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    }

    .card:hover {
      transform:translateY(-4px);
      border-color:rgba(0,212,170,.28);
      box-shadow:0 10px 30px rgba(0,212,170,.08);
    }

    .section-title {
      font-size:18px;
      margin-bottom:18px;
      font-weight:600;
    }

    .two-col {
      display:grid;
      grid-template-columns:1.3fr .7fr;
      gap:24px;
      margin-bottom:24px;
    }

    .two-col-equal {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      margin-bottom:24px;
    }

    #analysisPreview {
      width:100%;
      height:500px;
      border-radius:16px;
      overflow:hidden;
      background:#1f2635;
    }

    .legend-list {
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .legend-item {
      display:flex;
      align-items:center;
      gap:14px;
      padding:12px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:12px;
    }

    .legend-color {
      width:36px;
      height:36px;
      border-radius:10px;
      flex-shrink:0;
    }

    .legend-label {
      font-size:14px;
      color:#d8fffa;
      font-weight:500;
    }

    .legend-range {
      font-size:12px;
      color:#94a3b8;
      margin-top:2px;
    }

    .class-item {
      display:flex;
      align-items:center;
      gap:16px;
      padding:14px;
      margin-bottom:12px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
    }

    .class-rank {
      width:42px;
      height:42px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      flex-shrink:0;
    }

    .class-name { font-weight:600; margin-bottom:4px; }
    .class-range { color:#94a3b8; font-size:13px; }

    .meta-list {
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .meta-row {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:30px;
      padding-bottom:12px;
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .meta-row span {
      color:var(--muted);
      font-size:17px;
      min-width:160px;
    }

    .meta-row strong {
      color:#d8fffa;
      font-size:17px;
      text-align:right;
      max-width:260px;
      word-break:break-word;
    }

    .stats {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .stat-box {
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:20px;
    }

    .stat-label {
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
    }

    .stat-value {
      font-size:28px;
      font-weight:700;
      color:var(--accent);
    }

    .recommendation {
      padding:14px;
      background:rgba(0,212,170,.08);
      border:1px solid rgba(0,212,170,.18);
      border-radius:12px;
      margin-bottom:12px;
      color:#d8fffa;
      font-size:14px;
      line-height:1.5;
    }

    .export-btn {
      margin-top:18px;
      width:100%;
      border:none;
      background:var(--accent);
      color:#08110f;
      font-weight:700;
      padding:14px;
      border-radius:12px;
      cursor:pointer;
      transition:.2s;
      font-family:inherit;
    }

    .export-btn:hover { transform:translateY(-2px); }

    .score-badge {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 14px;
      border-radius:20px;
      font-size:13px;
      font-weight:600;
    }

    .score-high   { background:rgba(46,204,113,.15); color:#2ecc71; border:1px solid rgba(46,204,113,.3); }
    .score-mid    { background:rgba(240,165,0,.15);  color:#f0a500; border:1px solid rgba(240,165,0,.3); }
    .score-low    { background:rgba(231,76,60,.15);  color:#e74c3c; border:1px solid rgba(231,76,60,.3); }

    @media(max-width:950px) {
      body { padding:20px; }
      .two-col, .two-col-equal { grid-template-columns:1fr; }
      #analysisPreview { height:320px; }
    }
  </style>
</head>

<body>
<div class="container">

  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='profile_1.html'">← Back</button>
  </div>

  <div class="analysis-title" id="analysisTitle">Loading...</div>
  <div class="analysis-sub" id="analysisMeta">Loading analysis info...</div>

  <!-- ROW 1: Map + Legend -->
  <div class="two-col">
    <div class="card" style="padding:0; overflow:hidden;">
      <div id="analysisPreview"></div>
    </div>

    <div class="card">
      <div class="section-title">Legend</div>
      <div class="legend-list" id="legendList"></div>
    </div>
  </div>

  <!-- ROW 2: Classification + Metadata -->
  <div class="two-col-equal">
    <div class="card">
      <div class="section-title" id="classSummaryTitle">Classification Summary</div>
      <div id="classSummaryList"></div>
    </div>

    <div class="card">
      <div class="section-title">Analysis Metadata</div>
      <div class="meta-list">
        <div class="meta-row">
          <span>Analysis Type</span>
          <strong id="metaType">--</strong>
        </div>
        <div class="meta-row">
          <span>Generated At</span>
          <strong id="metaDate">--</strong>
        </div>
        <div class="meta-row">
          <span>Data Format</span>
          <strong id="metaFormat">GeoJSON</strong>
        </div>
        <div class="meta-row">
          <span>Overall Score</span>
          <strong id="metaScore">--</strong>
        </div>
        <div class="meta-row">
          <span>Status</span>
          <strong id="metaStatus">--</strong>
        </div>
      </div>
    </div>
  </div>

  <!-- ROW 3: Stats + Recommendations -->
  <div class="two-col-equal">
    <div class="card">
      <div class="section-title">Key Statistics</div>
      <div class="stats" id="statsGrid"></div>
    </div>

    <div class="card">
      <div class="section-title">Recommendations</div>
      <div id="recommendationsList"></div>
      <button class="export-btn" onclick="exportCurrentAnalysis()">Export Analysis Report</button>
    </div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_BASE_URL =
  window.location.hostname === "localhost" ||
  window.location.hostname === "127.0.0.1"
    ? "http://localhost:8000"
    : "";

const params = new URLSearchParams(window.location.search);
const analysisId = params.get("id");

// ── Vector Analysis Config ────────────────────────────────────────────────────
const VECTOR_CONFIG = {

  "crime": {
    title: "Crime Density Analysis",
    dataFormat: "GeoJSON",
    classTitle: "Crime Density Classes",
    legend: [
      { color:"#2ecc71", label:"Safe",      range:"0 – 5 crimes/km²" },
      { color:"#f1c40f", label:"Low Risk",  range:"5 – 10 crimes/km²" },
      { color:"#e67e22", label:"Moderate",  range:"10 – 15 crimes/km²" },
      { color:"#e74c3c", label:"High Risk", range:"15 – 20 crimes/km²" },
      { color:"#891508", label:"Hotspot",   range:"> 20 crimes/km²" }
    ],
    styleFeature(f) {
      const d = f.properties.crime_density || 0;
      let color = "#2ecc71";
      if (d > 5)  color = "#f1c40f";
      if (d > 10) color = "#e67e22";
      if (d > 15) color = "#e74c3c";
      if (d > 20) color = "#891508";
      return { fillColor: color, fillOpacity: 0.65, color: "#333", weight: 1 };
    },
    popupFn(f) {
      const p = f.properties;
      return `<strong>${p.NBHD_NAME || p.name || "Area"}</strong><br>
              Crime Count: ${p.crime_count || 0}<br>
              Density: ${(p.crime_density || 0).toFixed(2)} /km²`;
    },
    buildStats(features) {
      const densities = features.map(f => f.properties.crime_density || 0).filter(v => v > 0);
      const total     = features.reduce((s, f) => s + (f.properties.crime_count || 0), 0);
      const avg       = densities.length ? (densities.reduce((a,b)=>a+b,0)/densities.length).toFixed(2) : "--";
      const max       = densities.length ? Math.max(...densities).toFixed(2) : "--";
      return [
        { label:"Total Incidents",      value: total.toLocaleString() },
        { label:"Areas Analyzed",       value: features.length },
        { label:"Avg Density (/km²)",   value: avg },
        { label:"Peak Density (/km²)",  value: max },
      ];
    },
    recommendations(score) {
      if (score >= 75) return [
        "Safety conditions are relatively good. Maintain current monitoring efforts.",
        "Identify and protect low-crime zones for community development.",
        "Use this baseline to measure the impact of future safety interventions."
      ];
      if (score >= 40) return [
        "Moderate crime density detected. Focus on hotspot zones.",
        "Increase patrol presence in high-density areas.",
        "Compare crime patterns with traffic and informal settlement data."
      ];
      return [
        "High crime density detected. Urgent intervention needed in hotspot zones.",
        "Coordinate with law enforcement on targeted area strategies.",
        "Use grid analysis to pinpoint the worst local cells for safety planning."
      ];
    }
  },

  "public-transport": {
    title: "Public Transport Coverage",
    dataFormat: "GeoJSON",
    classTitle: "Coverage Classes",
    legend: [
      { color:"#4cc2ff", label:"Covered Zones",   range:"Within walking distance" },
      { color:"#e74c3c", label:"Uncovered Zones",  range:"Outside walking distance" },
      { color:"#1a8fc1", label:"Transit Stations", range:"Station points" }
    ],
    styleFeature(f) {
      const isCovered = f.properties.type === "covered";
      if (f.properties.layer === "station") return {};
      if (f.properties.layer === "boundary") {
        return { fillColor:"transparent", fillOpacity:0, color:"#f0a500", weight:2.5, dashArray:"6,3" };
      }
      return {
        fillColor:   isCovered ? "#4cc2ff" : "#e74c3c",
        fillOpacity: isCovered ? 0.45 : 0.25,
        color:       isCovered ? "#1a8fc1" : "#c0392b",
        weight: 1.5,
        dashArray: isCovered ? null : "5,4"
      };
    },
    pointToLayer(f, latlng) {
      if (f.properties.layer === "station") {
        return L.circleMarker(latlng, {
          radius:6, fillColor:"#1a8fc1", color:"#0d5f8a", weight:1.5, fillOpacity:1
        });
      }
      return L.circleMarker(latlng, { radius:5, fillColor:"#4cc2ff", color:"#1a8fc1", weight:1.5, fillOpacity:0.9 });
    },
    popupFn(f) {
      if (f.properties.layer === "station") return `<strong>Transit Station</strong>`;
      return `<strong>${f.properties.type === "covered" ? "Within" : "Outside"} walking distance</strong>`;
    },
    buildStats(features) {
      const covered   = features.filter(f => f.properties.type === "covered").length;
      const uncovered = features.filter(f => f.properties.type === "uncovered").length;
      const stations  = features.filter(f => f.properties.layer === "station").length;
      const total     = covered + uncovered;
      const pct       = total ? ((covered / total) * 100).toFixed(1) : "--";
      return [
        { label:"Coverage %",         value: pct + "%" },
        { label:"Covered Zones",      value: covered },
        { label:"Uncovered Zones",    value: uncovered },
        { label:"Transit Stations",   value: stations },
      ];
    },
    recommendations(score) {
      if (score >= 75) return [
        "Good transit coverage. Maintain existing station network.",
        "Focus on improving frequency and quality at existing stations.",
        "Monitor coverage as the city expands to new areas."
      ];
      if (score >= 40) return [
        "Moderate transit coverage. Significant uncovered areas remain.",
        "Prioritize new stations in high-density uncovered zones.",
        "Consider bus rapid transit or feeder services for gap areas."
      ];
      return [
        "Low transit coverage. Major investment needed.",
        "Identify the largest uncovered population clusters for priority.",
        "Consider park-and-ride facilities to extend existing coverage."
      ];
    }
  },

  "traffic": {
    title: "Traffic Analysis",
    dataFormat: "GeoJSON",
    classTitle: "Road Hierarchy Classes",
    legend: [
      { color:"#e74c3c", label:"Primary Roads",    range:"Main corridors" },
      { color:"#f39c12", label:"Secondary Roads",  range:"Connectors" },
      { color:"#3498db", label:"Local Roads",      range:"Local streets" }
    ],
    styleFeature(f) {
      const h = f.properties.hierarchy || "local";
      const color = h === "primary" ? "#e74c3c" : h === "secondary" ? "#f39c12" : "#3498db";
      return {
        color,
        weight:  h === "primary" ? 3.5 : h === "secondary" ? 2 : 1,
        opacity: h === "primary" ? 0.95 : h === "secondary" ? 0.80 : 0.55,
        fill: false
      };
    },
    popupFn(f) {
      const p = f.properties;
      const h = p.hierarchy || "local";
      return `<strong>${h.charAt(0).toUpperCase() + h.slice(1)} road</strong><br>
              Length: ${p.length_m != null ? (p.length_m/1000).toFixed(2)+" km" : "—"}<br>
              Intersections: ${p.max_degree || "—"} connections`;
    },
    buildStats(features) {
      const network  = features.filter(f => f.properties.service === "traffic-network");
      const primary  = network.filter(f => f.properties.hierarchy === "primary").length;
      const secondary= network.filter(f => f.properties.hierarchy === "secondary").length;
      const local    = network.filter(f => f.properties.hierarchy === "local").length;
      return [
        { label:"Total Segments",    value: network.length.toLocaleString() },
        { label:"Primary Roads",     value: primary },
        { label:"Secondary Roads",   value: secondary },
        { label:"Local Roads",       value: local },
      ];
    },
    recommendations(score) {
      if (score >= 75) return [
        "Road network is well-connected with good hierarchy balance.",
        "Monitor congestion in primary corridors during peak hours.",
        "Focus maintenance on local road conditions."
      ];
      if (score >= 40) return [
        "Moderate road connectivity. Some fragmented zones detected.",
        "Improve connections between local and secondary roads.",
        "Consider traffic signal optimization on secondary corridors."
      ];
      return [
        "Poor road network connectivity. Significant fragmentation detected.",
        "Prioritize new road links to connect isolated local zones.",
        "Invest in primary corridor upgrades to reduce congestion pressure."
      ];
    }
  },

  "vegetation": {
    title: "Vegetation Density Analysis",
    dataFormat: "GeoJSON",
    classTitle: "Vegetation Coverage Classes",
    legend: [
      { color:"#27ae60", label:"Excellent (≥50%)",    range:"High greenery" },
      { color:"#8bc34a", label:"Good (30–50%)",        range:"Meets standard" },
      { color:"#f39c12", label:"Below Standard (15–30%)", range:"Needs improvement" },
      { color:"#e67e22", label:"Low (5–15%)",          range:"Underserved" },
      { color:"#c0392b", label:"Very Low (<5%)",        range:"Critical" }
    ],
    styleFeature(f) {
      const pct = f.properties.vegetation_pct ?? 0;
      let color = "#c0392b";
      if (pct >= 50) color = "#27ae60";
      else if (pct >= 30) color = "#8bc34a";
      else if (pct >= 15) color = "#f39c12";
      else if (pct >= 5)  color = "#e67e22";
      return { fillColor: color, fillOpacity: 0.65, color: "rgba(0,0,0,0.2)", weight: 0.8 };
    },
    popupFn(f) {
      const p = f.properties;
      const pct = p.vegetation_pct !== null ? p.vegetation_pct.toFixed(1) + "%" : "—";
      const tag = p.passes_30pct ? "✓ Passes 30% standard" : "✗ Below 30% standard";
      return `<strong>Vegetation: ${pct}</strong><br>QoL Score: ${p.qol_score ?? "—"}/100<br>${tag}`;
    },
    buildStats(features) {
      const pcts  = features.map(f => f.properties.vegetation_pct ?? 0);
      const avg   = pcts.length ? (pcts.reduce((a,b)=>a+b,0)/pcts.length).toFixed(1) : "--";
      const pass  = features.filter(f => f.properties.passes_30pct).length;
      const fail  = features.length - pass;
      return [
        { label:"Avg Vegetation %",   value: avg + "%" },
        { label:"Cells ≥30% (Pass)",  value: pass },
        { label:"Cells <30% (Fail)",  value: fail },
        { label:"Total Cells",        value: features.length },
      ];
    },
    recommendations(score) {
      if (score >= 75) return [
        "Vegetation coverage meets or exceeds the 30% urban greenery standard.",
        "Protect existing green zones from urban development pressure.",
        "Compare NDVI results to validate vegetation health quality."
      ];
      if (score >= 40) return [
        "Moderate vegetation coverage. Some areas fall below the 30% benchmark.",
        "Target green infrastructure investment in low-coverage zones.",
        "Prioritize streets and blocks with vegetation below 15%."
      ];
      return [
        "Low vegetation coverage. Large-scale greening intervention needed.",
        "Identify areas for new parks, street trees, and green roofs.",
        "Use grid analysis to find the worst local cells for greenery shortage."
      ];
    }
  },

  "informal-settlement": {
    title: "Informal Settlement Analysis",
    dataFormat: "GeoJSON",
    classTitle: "Irregularity Classes",
    legend: [
      { color:"#2ecc71", label:"Planned (0–33)",    range:"Low irregularity" },
      { color:"#f39c12", label:"Mixed (34–66)",      range:"Medium irregularity" },
      { color:"#e74c3c", label:"Informal (67–100)",  range:"High irregularity" }
    ],
    styleFeature(f) {
      const p = f.properties;
      if (p.type === "high_irregularity_zone") {
        return { fillColor:"transparent", fillOpacity:0, color:"#e74c3c", weight:2.5, dashArray:"5,4" };
      }
      const s = p.irregularity_score ?? 0;
      let color = "#2ecc71";
      if (s > 66) color = "#e74c3c";
      else if (s > 33) color = "#f39c12";
      return { fillColor: color, fillOpacity: 0.7, color: "rgba(0,0,0,0.18)", weight: 0.7 };
    },
    popupFn(f) {
      const p = f.properties;
      if (p.type === "high_irregularity_zone") return "<strong>High Irregularity Zone</strong><br>Potential informal settlement area";
      return `<strong>Irregularity: ${p.irregularity_score ?? "—"}/100</strong><br>
              Classification: ${p.classification || "—"}<br>
              QoL Score: ${p.qol_score ?? "—"}/100`;
    },
    buildStats(features) {
      const cells = features.filter(f => f.properties.type !== "high_irregularity_zone");
      const scores = cells.map(f => f.properties.irregularity_score ?? 0);
      const avg  = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : "--";
      const high = cells.filter(f => (f.properties.irregularity_score ?? 0) > 66).length;
      const zones= features.filter(f => f.properties.type === "high_irregularity_zone").length;
      return [
        { label:"Avg Irregularity Score", value: avg + "/100" },
        { label:"High-Irregularity Cells",value: high },
        { label:"Informal Hotspot Zones", value: zones },
        { label:"Total Cells",            value: cells.length },
      ];
    },
    recommendations(score) {
      if (score >= 75) return [
        "The area is mostly planned and regular.",
        "Monitor edges of formal zones for informal expansion.",
        "Use results as baseline for future land-use planning."
      ];
      if (score >= 40) return [
        "Mixed settlement patterns detected. Some zones need attention.",
        "Focus urban upgrading programs on high-irregularity clusters.",
        "Compare with population density to prioritize interventions."
      ];
      return [
        "High informality patterns dominate. Priority urban planning needed.",
        "Initiate community-based upgrading programs in hotspot zones.",
        "Coordinate with housing authorities for legalization and infrastructure support."
      ];
    }
  },

  "facility-accessibility": {
    title: "Facility Accessibility",
    dataFormat: "GeoJSON",
    classTitle: "Walk-Time Classes",
    legend: [
      { color:"#198754", label:"≤ 5 min walk",  range:"Excellent access" },
      { color:"#52b788", label:"≤ 10 min walk", range:"Good access" },
      { color:"#ffc107", label:"≤ 15 min walk", range:"Acceptable access" },
      { color:"#fd7e14", label:"≤ 20 min walk", range:"Limited access" },
      { color:"#e74c3c", label:"No Access",      range:"Outside walking range" }
    ],
    styleFeature(f) {
      const p = f.properties;
      if (p.type === "uncovered" || p.category === "uncovered") {
        return { fillColor:"#e74c3c", fillOpacity:0.18, color:"#e74c3c", weight:1, dashArray:"4,3" };
      }
      if (p.layer === "boundary") {
        return { fillColor:"transparent", fillOpacity:0, color:"#f0a500", weight:2.5, dashArray:"6,3" };
      }
      const t = p.time_min;
      const colors = { 5:"#198754", 10:"#52b788", 15:"#ffc107", 20:"#fd7e14" };
      const color  = colors[t] || "#888";
      const opacity = t === 5 ? 0.45 : t === 10 ? 0.38 : t === 15 ? 0.30 : 0.22;
      return { fillColor: color, fillOpacity: opacity, color, weight: 1.5 };
    },
    pointToLayer(f, latlng) {
      return L.circleMarker(latlng, {
        radius:5, fillColor:"#4cc2ff", color:"#1a8fc1", weight:1.5, opacity:1, fillOpacity:0.9
      });
    },
    popupFn(f) {
      const p = f.properties;
      if (p.type === "uncovered" || p.category === "uncovered") {
        return "<strong style='color:#e74c3c'>Outside walking range</strong>";
      }
      if (p.layer === "boundary") return "<strong>Area of Interest</strong>";
      return `<strong>Within ${p.time_min} min walk</strong><br>
              Radius: ${p.radius_m} m<br>
              Facilities: ${p.facility_count}`;
    },
    buildStats(features) {
      const zones    = features.filter(f => f.properties.time_min != null);
      const uncovered= features.filter(f => f.properties.type === "uncovered" || f.properties.category === "uncovered").length;
      const within5  = features.filter(f => f.properties.time_min === 5).length;
      const within15 = features.filter(f => f.properties.time_min != null && f.properties.time_min <= 15).length;
      return [
        { label:"Zones within 5 min",   value: within5 },
        { label:"Zones within 15 min",  value: within15 },
        { label:"Uncovered Zones",       value: uncovered },
        { label:"Total Zone Features",   value: zones.length },
      ];
    },
    recommendations(score) {
      if (score >= 75) return [
        "Excellent facility accessibility across the area.",
        "Maintain current facility distribution for sustained coverage.",
        "Focus on quality and capacity of existing facilities."
      ];
      if (score >= 40) return [
        "Moderate facility accessibility. Some gaps remain.",
        "Prioritize new facilities in uncovered high-density zones.",
        "Consider mobile or pop-up services for hard-to-reach areas."
      ];
      return [
        "Low facility accessibility. Large portions of the area are underserved.",
        "Plan new facility locations based on population distribution.",
        "Use grid analysis to identify the worst accessibility cells."
      ];
    }
  }
};

// ── Helper ────────────────────────────────────────────────────────────────────
function hexToSoftBg(hex) {
  if (!hex || !hex.startsWith("#")) return "rgba(0,212,170,.12)";
  const clean = hex.replace("#","");
  const r = parseInt(clean.substring(0,2),16);
  const g = parseInt(clean.substring(2,4),16);
  const b = parseInt(clean.substring(4,6),16);
  return `rgba(${r},${g},${b},.15)`;
}

function scoreColor(score) {
  if (score >= 75) return "#2ecc71";
  if (score >= 40) return "#f0a500";
  return "#e74c3c";
}

function scoreClass(status) {
  if (status === "high") return "score-high";
  if (status === "mid")  return "score-mid";
  return "score-low";
}

// ── Main loader ───────────────────────────────────────────────────────────────
async function loadAnalysisDetails() {
  const username = localStorage.getItem("username") || "default";
  const res  = await fetch(`${API_BASE_URL}/analyses?username=${username}`);
  const data = await res.json();

  const analysis = data.find(a => String(a.id) === String(analysisId));

  if (!analysis) {
    document.getElementById("analysisTitle").textContent = "Analysis not found";
    document.getElementById("analysisMeta").textContent  = "";
    return;
  }

  const config = VECTOR_CONFIG[analysis.type];

  if (!config) {
    document.getElementById("analysisTitle").textContent = "Unsupported vector analysis";
    document.getElementById("analysisMeta").textContent  =
      `This page supports vector analyses only. Type: ${analysis.type}`;
    return;
  }

  // ── Header ────────────────────────────────────────────────
  document.getElementById("analysisTitle").textContent = analysis.title || config.title;
  document.getElementById("analysisMeta").textContent  =
    `${analysis.area || "Vector analysis"} • ${new Date(analysis.created_at).toLocaleString()}`;

  // ── Metadata ──────────────────────────────────────────────
  document.getElementById("metaType").textContent   = config.title;
  document.getElementById("metaDate").textContent   = new Date(analysis.created_at).toLocaleString();
  document.getElementById("metaFormat").textContent = config.dataFormat;

  const score  = analysis.score ?? "--";
  const status = analysis.status || "mid";
  document.getElementById("metaScore").innerHTML =
    `<span class="score-badge ${scoreClass(status)}">${score}/100</span>`;
  document.getElementById("metaStatus").innerHTML =
    `<span class="score-badge ${scoreClass(status)}">${status.toUpperCase()}</span>`;

  // ── Legend & Classification ───────────────────────────────
  renderLegend(config);
  renderClassSummary(config);

  // ── Map ───────────────────────────────────────────────────
  const map = L.map("analysisPreview").setView([30.0444, 31.2357], 10);
  L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    { attribution: "Tiles © Esri" }
  ).addTo(map);

  // Load GeoJSON result
  if (!analysis.result_file) {
    document.getElementById("analysisPreview").style.background =
      `linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),url(${analysis.preview_image || "images/opening-bg.png"}) center/cover`;
    renderEmptyStats();
    renderRecommendations(config.recommendations(analysis.score || 50));
    return;
  }

  try {
    const geojsonUrl = `${API_BASE_URL}/${analysis.result_file}`;
    const geojsonRes = await fetch(geojsonUrl);

    if (!geojsonRes.ok) throw new Error(`HTTP ${geojsonRes.status}`);

const geojson = await geojsonRes.json();
console.log("first feature:", geojson.features[0]?.properties);
const features = geojson.features || [];
console.log("total:", geojson.features.length);
console.log("network:", geojson.features.filter(f => f.properties.service === "traffic-network").length);
console.log("hierarchy:", geojson.features.filter(f => f.properties.hierarchy !== undefined).length);

 // Render on map
const layer = L.geoJSON(geojson, {
  filter: f => {
    if (analysis.type === "traffic") {
      return f.properties.congestion === undefined && f.properties.type !== "hotspot";
    }
    return true;
  },
  style:        f => config.styleFeature(f),
  pointToLayer: config.pointToLayer
    ? (f, ll) => config.pointToLayer(f, ll)
    : undefined,
  onEachFeature: (f, l) => {
    const popup = config.popupFn(f);
    if (popup) l.bindPopup(popup);
  }
    }).addTo(map);

    try {
      const bounds = layer.getBounds();
      if (bounds && bounds.isValid()) map.fitBounds(bounds, { padding:[50,50] });
    } catch(e) {}

    setTimeout(() => map.invalidateSize(), 300);

    // Stats
    const stats = config.buildStats(features);
    renderStats(stats);

    // Recommendations
    renderRecommendations(config.recommendations(analysis.score || 50));

  } catch(err) {
    console.error("Vector loading error:", err);
    document.getElementById("analysisPreview").innerHTML = `
      <div style="padding:30px;color:#e74c3c;">Failed to load result: ${err.message}</div>`;
    renderEmptyStats();
    renderRecommendations(config.recommendations(50));
  }
}

// ── Render helpers ────────────────────────────────────────────────────────────
function renderLegend(config) {
  document.getElementById("legendList").innerHTML = config.legend.map(item => `
    <div class="legend-item">
      <div class="legend-color" style="background:${item.color};"></div>
      <div>
        <div class="legend-label">${item.label}</div>
        <div class="legend-range">${item.range}</div>
      </div>
    </div>`).join("");
}

function renderClassSummary(config) {
  document.getElementById("classSummaryTitle").textContent = config.classTitle;
  document.getElementById("classSummaryList").innerHTML = config.legend.map((item, i) => `
    <div class="class-item">
      <div class="class-rank" style="background:${hexToSoftBg(item.color)};color:${item.color};">
        ${i + 1}
      </div>
      <div>
        <div class="class-name">${item.label}</div>
        <div class="class-range">${item.range}</div>
      </div>
    </div>`).join("");
}

function renderStats(stats) {
  document.getElementById("statsGrid").innerHTML = stats.map(s => `
    <div class="stat-box">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
    </div>`).join("");
}

function renderEmptyStats() {
  document.getElementById("statsGrid").innerHTML = `
    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-value">--</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Features</div>
      <div class="stat-value">--</div>
    </div>`;
}

function renderRecommendations(items) {
  document.getElementById("recommendationsList").innerHTML = items.map(text => `
    <div class="recommendation">${text}</div>`).join("");
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportCurrentAnalysis() {
  const title  = document.getElementById("analysisTitle").textContent;
  const type   = document.getElementById("metaType").textContent;
  const date   = document.getElementById("metaDate").textContent;
  const score  = document.getElementById("metaScore").textContent;
  const status = document.getElementById("metaStatus").textContent;

  const statBoxes = document.querySelectorAll(".stat-box");
  let statsText = "";
  statBoxes.forEach(box => {
    const label = box.querySelector(".stat-label")?.textContent || "";
    const value = box.querySelector(".stat-value")?.textContent || "";
    statsText += `${label}: ${value}\n`;
  });

  const content =
`MALAZ VECTOR ANALYSIS REPORT
=============================

Title: ${title}
Type: ${type}
Generated At: ${date}
Score: ${score}
Status: ${status}

Key Statistics:
---------------
${statsText}
Generated from MALAZ Platform.
`;

  const blob = new Blob([content], { type:"text/plain" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = "vector-analysis-report.txt";
  a.click();
  URL.revokeObjectURL(url);
}

loadAnalysisDetails();
</script>
