<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Malaz · User Profile</title>
  <link type="image/png" sizes="16x16" rel="icon" href="https://img.icons8.com/isometric-line/50/ffffff/building.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222636;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #00d4aa;
      --accent2: #0099ff;
      --text: #e8eaf0;
      --muted: #7a7f94;
      --danger: #ff4d6d;
      --warn: #f59e0b;
      --success: #10b981;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo svg {
      width: 28px; height: 28px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .analysis-svg{
  width:22px;
  height:22px;
  object-fit:contain;
}

    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Layout ── */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 2rem;
      align-items: start;
    }

    /* ── Profile Card ── */
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: sticky;
      top: 80px;
    }

    .profile-banner {
      height: 80px;
      background: linear-gradient(135deg, #0f4c3a 0%, #1a3a5c 100%);
      position: relative;
    }

    .profile-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(0,212,170,0.04) 10px,
        rgba(0,212,170,0.04) 20px
      );
    }

    .avatar-wrap {
      padding: 0 1.5rem;
      margin-top: -32px;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid var(--surface);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 600;
      color: #0f1117;
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
      font-size: 18px;
    }

    .avatar:hover .avatar-overlay { opacity: 1; }

    .profile-info {
      padding: 1rem 1.5rem 1.5rem;
    }

    .profile-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .profile-email {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.25);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 1.25rem;
    }

    .profile-badge span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

    .profile-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      text-align: center;
    }

    .stat-num {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      display: block;
      font-family: 'DM Mono', monospace;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      font-size: 13px;
      color: var(--muted);
    }

    .info-row svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.6; }
    .info-row span { color: var(--text); }

    .edit-btn {
      width: 100%;
      padding: 10px;
      background: rgba(0,212,170,0.08);
      border: 1px solid rgba(0,212,170,0.2);
      color: var(--accent);
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
    }

    .edit-btn:hover {
      background: rgba(0,212,170,0.15);
      border-color: var(--accent);
    }

    /* ── Right Column ── */
    .right-col { display: flex; flex-direction: column; gap: 1.5rem; }

    /* ── Section Header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title svg { width: 16px; height: 16px; color: var(--accent); }

    .section-count {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ── Edit Form Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select,
    textarea {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 80px; }

    select option { background: var(--surface); }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 9px 20px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover { border-color: var(--border2); color: var(--text); }

    .btn-save {
      background: var(--accent);
      border: none;
      color: #0f1117;
      padding: 9px 24px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-save:hover { background: #00f0c0; }

    /* ── Analysis History ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 14px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,212,170,0.07);
    }

  .analysis-list{
  display:flex;
  flex-direction:column;
  gap:16px;
  width:100%;
}

  .analysis-item{
  width:100%;
  min-height:90px;
  background:rgba(26,29,39,.88);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:18px 20px;

  display:grid;
  grid-template-columns:50px 1fr auto;

  gap:18px;
  align-items:center;

  position:relative;
  overflow:hidden;

  transition:
    transform .25s ease,
    border-color .25s ease,
    box-shadow .25s ease;

  cursor:pointer;
}

.analysis-item:hover{
  transform:translateY(-3px);
  border-color:rgba(0,212,170,.28);
  box-shadow:0 10px 30px rgba(0,212,170,.08);
}

    .analysis-icon{
  width:52px;
  height:52px;

  border-radius:16px;

  display:flex;
  align-items:center;
  justify-content:center;

  flex-shrink:0;

  background:linear-gradient(
    135deg,
    rgba(0,212,170,.12),
    rgba(0,153,255,.08)
  );

  border:1px solid rgba(255,255,255,.06);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 4px 14px rgba(0,0,0,.18);
}

.analysis-icon img{
  width:26px;
  height:26px;
  object-fit:contain;
  opacity:.95;
}

    /* .analysis-icon.ndvi    { background: rgba(16,185,129,0.12); }
    .analysis-icon.heat    { background: rgba(245,158,11,0.12); }
    .analysis-icon.crime   { background: rgba(255,77,109,0.12); }
    .analysis-icon.transit { background: rgba(0,153,255,0.12); }
    .analysis-icon.urban   { background: rgba(168,85,247,0.12); }
    .analysis-icon.air     { background: rgba(0,212,170,0.12); } */

    .analysis-meta h4 {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }

    .analysis-meta p {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .analysis-meta p span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .analysis-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .score-badge {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 6px;
    }

    .score-high   { background: rgba(16,185,129,0.12); color: #10b981; }
    .score-mid    { background: rgba(245,158,11,0.12);  color: #f59e0b; }
    .score-low    { background: rgba(255,77,109,0.12);  color: #ff4d6d; }

    .dl-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      
    }

    html[dir="rtl"] .dl-btn{
  direction: rtl;
}

    .dl-btn:hover { border-color: var(--accent); color: var(--accent); }

    .dl-btn svg { width: 12px; height: 12px; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--muted);
    }

    .empty-state svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 1rem; }
    .empty-state p { font-size: 14px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .profile-card { position: static; }
    }
  </style>
</head>

<!-- Navbar -->
<nav>

  <a href="#" class="nav-logo">

    <span>
      <img width="45"

    <span>
      Malaz · Urban Quality of Life Analysis
    </span>

  </a>

    <button class="nav-btn"

  </div>

</nav>

<!-- Main -->
<div class="container">

  <!-- Left: Profile Card -->

    <div class="profile-card">

        <button class="edit-btn" onclick="toggleEdit()">

      </div>
    </div>
  </aside>

  <!-- Right Column -->
  <main class="right-col">

    <!-- Edit Form (hidden by default) -->
    <div class="card" id="editForm" style="display:none">

          Edit Profile
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="firstName" value="Nada" placeholder="First name"/>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lastName" value="Faroha" placeholder="Last name"/>
        </div>
        <div class="form-group full">
          <label>Email Address</label>
          <input type="email" id="emailInput" value="nada@urbanqol.io" placeholder="email@example.com"/>
        </div>
        <div class="form-group">
          <label>Phone</label>

        </div>
        <div class="form-group">

        </div>
        <div class="form-group full">
          <label>Organization</label>

        </div>
        <div class="form-group full">
          <label>Bio</label>
          <textarea id="bioInput" placeholder="Tell us about your research focus...">Urban GIS analyst focused on quality of life metrics across Egyptian cities.</textarea>
        </div>
        <div class="form-group">
          <label>Research Focus</label>
          <select id="focusInput">
            <option>Urban Planning</option>
            <option>Environmental Analysis</option>
            <option>Transportation</option>
            <option>Public Health</option>
            <option>Informal Settlements</option>
          </select>
        </div>
        <div class="form-group">
          <label>Country</label>
          <select id="countryInput">
            <option>Egypt</option>
            <option>Saudi Arabia</option>
            <option>UAE</option>
            <option>Jordan</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="toggleEdit()">Cancel</button>

    <!-- Analysis History -->
<div class="card">

    <div class="section-title">

      </svg>

      </span>

      12 runs

  </div>

      <div class="filters">

        <button class="filter-btn" onclick="filterHistory('crime', this)">Crime</button>
        <button class="filter-btn" onclick="filterHistory('urban', this)">Urban Density</button>
        <button class="filter-btn" onclick="filterHistory('air', this)">Air Quality</button>
      </div>

      <div class="analysis-list" id="analysisList"></div>
    </div>

  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast">

  <span id="toastMsg">Changes saved successfully</span>
</div>

let analyses = [];

async function loadAnalyses() {
  const username = localStorage.getItem('username') || 'default';
  const res = await fetch(`${API_BASE_URL}/analyses?username=${username}`)
  // fetch(`http://localhost:8000/analyses?username=${username}`)
  const data = await res.json();
  analyses = Array.isArray(data) ? data : [];
  renderList('all');
}

  function renderList(filter) {
    currentFilter = filter;
    const list = document.getElementById('analysisList');
    const count = document.getElementById('historyCount');
    const filtered = filter === 'all' ? analyses : analyses.filter(a => a.type === filter);
    count.textContent =
    filtered.length + ' ' + translations[currentLang].runs;
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <p>No analyses found for this filter.</p>
      </div>`;
      return;
    }

list.innerHTML = filtered.map(a => {

  const icon =
  ANALYSIS_ICONS[a.type]
    ? `<img src="${ANALYSIS_ICONS[a.type]}" alt="${a.type}">`
    : "📊";

  const translatedTitle =
    ANALYSIS_LABELS[a.type]?.[currentLang]
    || a.title;

  const date =
    a.created_at
      ? new Date(a.created_at).toLocaleDateString()
      : '';

  const time =
    a.created_at
      ? new Date(a.created_at).toLocaleTimeString()
      : '';

  return `

    <div class="analysis-item" onclick="openAnalysisDetails(${a.id})">
      <div class="analysis-icon ${a.type}">${icon}</div>
      <div class="analysis-meta">
        <h4>${translatedTitle}</h4>
        <p>
          <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>

  function toggleEdit() {

async function saveProfile() {
  const username = localStorage.getItem('username') || 'default';
  const first = document.getElementById('firstName').value.trim();
  const last  = document.getElementById('lastName').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const city  = document.getElementById('cityInput').value.trim();
  const org   = document.getElementById('orgInput').value.trim();

  const res = await fetch(`${API_BASE_URL}/profile?username=${username}`, {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    full_name: first + ' ' + last,
    email: email,
    city: city,
    organization: org,
    phone: document.getElementById('phoneInput').value.trim()
  })
});

  const data = await res.json();

  document.getElementById('displayName').textContent = first + ' ' + last;
  document.getElementById('displayEmail').textContent = email;
  document.getElementById('displayCity').textContent = city;
  document.getElementById('displayOrg').textContent = org;

  const initials = (first[0] || '') + (last[0] || '');
  document.getElementById('avatarInitials').textContent = initials.toUpperCase();

  toggleEdit();
  showToast('Profile updated successfully');
}
  function handleAvatar(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    const username = localStorage.getItem('username') || 'default';
    localStorage.setItem(`profileAvatar_${username}`, ev.target.result);
    setAvatarImage(ev.target.result);
    showToast('Profile photo saved');
  };

  reader.readAsDataURL(file);
 }

 function setAvatarImage(src) {
  const av = document.getElementById('avatarEl');
  av.style.backgroundImage = `url(${src})`;
  av.style.backgroundSize = 'cover';
  av.style.backgroundPosition = 'center';
  document.getElementById('avatarInitials').style.display = 'none';
}

 function loadSavedAvatar() {
  const username = localStorage.getItem('username') || 'default';
  const savedAvatar = localStorage.getItem(`profileAvatar_${username}`);

  if (savedAvatar) {
    setAvatarImage(savedAvatar);
  }
}

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

function exportAnalysis(event, id) {

  event.stopPropagation();

  const analysis =
    analyses.find(a => a.id === id);

  if (!analysis) return;

  const isAr =
  currentLang === "ar";

const content = isAr ? `

تقرير تحليل MALAZ
=========================

العنوان:
${analysis.title}

المنطقة:
${analysis.area}

النتيجة:
${analysis.score}/100

الحالة:
${analysis.status}

تاريخ الإنشاء:
${new Date(
  analysis.created_at
).toLocaleString()}

`
:
`

MALAZ ANALYSIS REPORT
=========================

Title:
${analysis.title}

Area:
${analysis.area}

Score:
${analysis.score}/100

Status:
${analysis.status}

Generated:
${new Date(
  analysis.created_at
).toLocaleString()}

`;

  const blob =
    new Blob(
      [content],
      { type:'text/plain' }
    );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement('a');

  a.href = url;

  a.download =
    `${analysis.title}.txt`;

  a.click();

  URL.revokeObjectURL(url);

}
